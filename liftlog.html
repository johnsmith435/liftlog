function render() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.day === S.activeDay));
  const main = document.getElementById('main');
  if (S.activeDay === 'dashboard') {
    main.innerHTML = dashboardHTML();
    initCharts();
  } else {
    main.innerHTML = dayHTML(S.activeDay);
  }
}

// ── Day view ───────────────────────────────────────────────────────────────
function dayHTML(day) {
  const COLOR = { push:'push', pull:'pull', legs:'legs', arms:'arms' };
  const LABEL = { push:'Push Day', pull:'Pull Day', legs:'Leg Day', arms:'Arms Day' };
  const last = getLastSession(day);
  const daySessions = S.history.filter(h => h.day === day).reverse();

  const cards = S.split[day].length
    ? S.split[day].map(id => cardHTML(id, day, last)).join('')
    : `<div class="empty-state"><div class="empty-icon">💪</div><div class="empty-text">No exercises yet — add from the bank</div></div>`;

  return `
    <div class="day-header">
      <div>
        <div class="day-title" style="color:var(--${COLOR[day]})">${LABEL[day]}</div>
        <div class="day-subtitle">${last ? 'Last logged: '+formatDateShort(last.date) : 'No previous sessions'}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" onclick="openReorder('${day}')">Reorder</button>
        <button class="btn btn-ghost" onclick="openBankModal(null,'${day}')">${svg(ICO.plus)} Add</button>
      </div>
    </div>
    <div class="workout-actions" style="margin-top:0;margin-bottom:16px">
      <button class="btn btn-primary" onclick="startWorkout('${day}')" style="flex:1">${svg(ICO.check)} Start Workout</button>
      <button class="btn btn-ghost"   onclick="logWorkout('${day}')">Quick Log</button>
      <button class="btn btn-ghost"   onclick="clearDay('${day}')">Clear</button>
    </div>
    <div class="exercises-list" id="list-${day}">${cards}</div>
    ${sessionHistoryHTML(day, daySessions)}`;
}

// ── Exercise card ──────────────────────────────────────────────────────────
function cardHTML(exId, day, lastSession) {
  const ex = S.bank[exId];
  if (!ex) return '';

  // Init session entry with defaults
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  S.session[day][exId] = migrateEntry(S.session[day][exId]);
  const sessionSets = S.session[day][exId];

  // Previous session: summarise as "Nsets × Wlb × R reps"
  const prevSets = lastSession?.exercises?.[exId] || [];
  let prevHTML = '';
  if (prevSets.length) {
    const prevW = prevSets[0]?.weight ?? '';
    const prevR = prevSets[0]?.reps ?? '';
    const prevN = prevSets.length;
    prevHTML = `
      <div class="card-prev">
        <span class="prev-label">Last · ${formatDateShort(lastSession.date)}</span>
        <span class="prev-chip">${prevN} × ${prevW}lb × ${prevR} reps</span>
      </div>`;
  }

  const isDescOpen = !!openDescs[exId+day];
  const descHTML = ex.desc ? `
    <div class="card-desc ${isDescOpen?'open':''}" id="desc-${exId}-${day}">
      ${ex.desc}
      ${ex.caliUrl ? `<br><a class="desc-src" href="${ex.caliUrl}" target="_blank" rel="noopener">View on Calistree ↗</a>` : ''}
    </div>` : '';

  const caliLink = ex.caliUrl
    ? `<a class="cali-link" href="${ex.caliUrl}" target="_blank" rel="noopener" title="View on Calistree" onclick="event.stopPropagation()">${svg(ICO.ext,9)}</a>`
    : '';
  const infoBtn = ex.desc
    ? `<button class="icon-btn ${isDescOpen?'is-active':''}" onclick="toggleDesc('${exId}','${day}')" title="About this exercise">${svg(ICO.info)}</button>`
    : '';

  const isFlaggedHome = !!S.flaggedForIncrease?.[exId];
  const suggestWHome = shouldSuggestWeightUp(exId);
  const homeSuggestHTML = suggestWHome
    ? `<div class="wk-suggest">${svg(ICO.arrowUp,11)} ${isFlaggedHome ? 'Flagged for weight increase next session' : `Consider moving up from ${suggestWHome}lb — you've hit 3 sessions at ≥8 reps`}</div>`
    : '';

  return `
    <div class="exercise-card" data-id="${exId}">
      <div class="card-header">
        <div class="card-name">${ex.name}${caliLink}</div>
        <div class="card-actions">
          ${infoBtn}
          <button class="icon-btn" onclick="toggleFlagIncreaseHome('${exId}','${day}')" title="${isFlaggedHome ? 'Remove flag' : 'Flag for weight increase next session'}" style="${isFlaggedHome ? 'color:var(--orange);border-color:var(--orange)' : ''}">${svg(ICO.arrowUp)}</button>
          <button class="icon-btn swap"   onclick="openBankModal('${exId}','${day}')"  title="Swap exercise">${svg(ICO.swap)}</button>
          <button class="icon-btn danger" onclick="removeFromDay('${exId}','${day}')"  title="Remove">${svg(ICO.close)}</button>
        </div>
      </div>
      ${descHTML}
      ${homeSuggestHTML}
      ${prevHTML}
      <div class="card-body">${cardBodyHTML(sessionSets, exId, day)}</div>
    </div>`;
}

// ── Description toggle ─────────────────────────────────────────────────────
function toggleWkDesc(exId) {
  const key = exId + 'wk';
  openDescs[key] = !openDescs[key];
  const el = document.getElementById(`desc-${exId}-wk`);
  if (el) el.classList.toggle('open', openDescs[key]);
  const card = document.querySelector(`#wk-scroll .wk-card[data-id="${exId}"]`);
  if (card) {
    const btn = card.querySelector(`button[onclick*="toggleWkDesc"]`);
    if (btn) btn.classList.toggle('is-active', openDescs[key]);
  }
}

function toggleDesc(exId, day) {
  const key = exId+day;
  openDescs[key] = !openDescs[key];
  const el  = document.getElementById(`desc-${exId}-${day}`);
  const card = el?.closest('.exercise-card');
  if (el) el.classList.toggle('open', openDescs[key]);
  if (card) {
    const btn = card.querySelector(`button[onclick*="toggleDesc"]`);
    if (btn) btn.classList.toggle('is-active', openDescs[key]);
  }
}

// ── Session entry helpers ──────────────────────────────────────────────────
function cardBodyHTML(sets, exId, day) {
  const key = exId + day;
  const expanded = !!expandedCards[key];
  if (expanded) {
    const rows = sets.map((s, i) => `
      <div class="set-row">
        <div class="set-row-label">Set ${i + 1}</div>
        <div class="set-field">
          <div class="set-field-label">Weight (lbs)</div>
          <input class="set-input" type="number" min="0" step="2.5" inputmode="decimal"
            placeholder="0" value="${s.weight}"
            onchange="updateSetEntry('${exId}','${day}',${i},'weight',this.value)">
        </div>
        <div class="set-field">
          <div class="set-field-label">Reps</div>
          <input class="set-input" type="number" min="1" step="1" inputmode="numeric"
            placeholder="0" value="${s.reps}"
            onchange="updateSetEntry('${exId}','${day}',${i},'reps',this.value)">
        </div>
        ${sets.length > 1 ? `<button class="remove-set-btn" onclick="removeSet('${exId}','${day}',${i})" title="Remove set">−</button>` : ''}
      </div>`).join('');
    return rows + `<button class="add-set-btn" onclick="addSet('${exId}','${day}')">+ Add Set</button>
      <button class="add-set-btn" style="margin-top:4px;border-style:solid;color:var(--muted)" onclick="collapseCard('${exId}','${day}')">Collapse</button>`;
  }
  // Collapsed: single weight/reps + sets counter
  const w = sets[0]?.weight ?? '';
  const r = sets[0]?.reps ?? '';
  const n = sets.length;
  return `
    <div class="set-row" style="align-items:flex-end">
      <div class="set-field">
        <div class="set-field-label">Weight (lbs)</div>
        <input class="set-input" type="number" min="0" step="2.5" inputmode="decimal"
          placeholder="0" value="${w}"
          onchange="updateEntry('${exId}','${day}','weight',this.value)">
      </div>
      <div class="set-field">
        <div class="set-field-label">Reps</div>
        <input class="set-input" type="number" min="1" step="1" inputmode="numeric"
          placeholder="0" value="${r}"
          onchange="updateEntry('${exId}','${day}','reps',this.value)">
      </div>
      <div class="sets-counter">
        <div class="sets-counter-label">Sets</div>
        <div class="sets-counter-control">
          <button class="sets-counter-btn" onclick="changeSetCount('${exId}','${day}',-1)">−</button>
          <div class="sets-counter-val" id="sets-count-${exId}-${day}">${n}</div>
          <button class="sets-counter-btn" onclick="changeSetCount('${exId}','${day}',+1)">+</button>
        </div>
      </div>
    </div>
    <button class="add-set-btn" style="margin-top:6px" onclick="expandCard('${exId}','${day}')">Edit sets individually</button>`;
}

// Session history edit mode — reads/writes S.history session exercises
function sessionEditCardBodyHTML(sets, sessionId, exId) {
  const key = sessionId + exId;
  const expanded = !!expandedCards[key];
  if (expanded) {
    const rows = sets.map((s, i) => `
      <div class="set-row">
        <div class="set-row-label">Set ${i + 1}</div>
        <div class="set-field">
          <div class="set-field-label">Weight (lbs)</div>
          <input class="set-input" type="number" min="0" step="2.5" inputmode="decimal"
            placeholder="0" value="${s.weight}"
            onchange="updateHistorySetEntry('${sessionId}','${exId}',${i},'weight',this.value)">
        </div>
        <div class="set-field">
          <div class="set-field-label">Reps</div>
          <input class="set-input" type="number" min="1" step="1" inputmode="numeric"
            placeholder="0" value="${s.reps}"
            onchange="updateHistorySetEntry('${sessionId}','${exId}',${i},'reps',this.value)">
        </div>
        ${sets.length > 1 ? `<button class="remove-set-btn" onclick="removeHistorySet('${sessionId}','${exId}',${i})">−</button>` : ''}
      </div>`).join('');
    return rows +
      `<button class="add-set-btn" onclick="addHistorySet('${sessionId}','${exId}')">+ Add Set</button>
       <button class="add-set-btn" style="margin-top:4px;border-style:solid;color:var(--muted)" onclick="collapseHistoryCard('${sessionId}','${exId}')">Collapse</button>`;
  }
  const w = sets[0]?.weight ?? '', r = sets[0]?.reps ?? '', n = sets.length;
  return `
    <div class="set-row" style="align-items:flex-end">
      <div class="set-field">
        <div class="set-field-label">Weight (lbs)</div>
        <input class="set-input" type="number" min="0" step="2.5" inputmode="decimal"
          placeholder="0" value="${w}"
          onchange="updateHistoryEntry('${sessionId}','${exId}','weight',this.value)">
      </div>
      <div class="set-field">
        <div class="set-field-label">Reps</div>
        <input class="set-input" type="number" min="1" step="1" inputmode="numeric"
          placeholder="0" value="${r}"
          onchange="updateHistoryEntry('${sessionId}','${exId}','reps',this.value)">
      </div>
      <div class="sets-counter">
        <div class="sets-counter-label">Sets</div>
        <div class="sets-counter-control">
          <button class="sets-counter-btn" onclick="changeHistorySetCount('${sessionId}','${exId}',-1)">−</button>
          <div class="sets-counter-val" id="sedit-n-${sessionId}-${exId}">${n}</div>
          <button class="sets-counter-btn" onclick="changeHistorySetCount('${sessionId}','${exId}',+1)">+</button>
        </div>
      </div>
    </div>
    <button class="add-set-btn" style="margin-top:6px" onclick="expandHistoryCard('${sessionId}','${exId}')">Edit sets individually</button>`;
}

function refreshSessionExRow(sessionId, exId) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  const sets = s.exercises[exId] || [];
  const el = document.querySelector(`.sedit-body[data-sid="${sessionId}"][data-exid="${exId}"]`);
  if (el) el.innerHTML = sessionEditCardBodyHTML(sets, sessionId, exId);
}

function updateHistoryEntry(sessionId, exId, field, val) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  const parsed = val === '' ? '' : parseFloat(val) || val;
  s.exercises[exId].forEach(set => set[field] = parsed);
}

function updateHistorySetEntry(sessionId, exId, idx, field, val) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  s.exercises[exId][idx][field] = val === '' ? '' : parseFloat(val) || val;
}

function changeHistorySetCount(sessionId, exId, delta) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  const sets = s.exercises[exId];
  if (delta > 0) { const last = sets.slice(-1)[0] || { weight:'', reps:'' }; sets.push({ weight: last.weight, reps: last.reps }); }
  else if (delta < 0 && sets.length > 1) { sets.pop(); }
  const el = document.getElementById(`sedit-n-${sessionId}-${exId}`);
  if (el) el.textContent = sets.length;
}

function addHistorySet(sessionId, exId) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  const last = s.exercises[exId].slice(-1)[0] || { weight:'', reps:'' };
  s.exercises[exId].push({ weight: last.weight, reps: last.reps });
  refreshSessionExRow(sessionId, exId);
}

function removeHistorySet(sessionId, exId, idx) {
  const s = S.history.find(h => h.id === sessionId); if (!s) return;
  if (s.exercises[exId].length <= 1) return;
  s.exercises[exId].splice(idx, 1);
  refreshSessionExRow(sessionId, exId);
}

function expandHistoryCard(sessionId, exId) {
  expandedCards[sessionId + exId] = true;
  refreshSessionExRow(sessionId, exId);
}

function collapseHistoryCard(sessionId, exId) {
  expandedCards[sessionId + exId] = false;
  refreshSessionExRow(sessionId, exId);
}

function refreshCardBody(exId, day) {
  const sets = S.session[day][exId];
  const html = cardBodyHTML(sets, exId, day);
  // Prefer workout overlay card when active — querySelector finds main UI card first in DOM order
  const card = WK.day
    ? document.querySelector(`#wk-scroll .wk-card[data-id="${exId}"]`)
    : document.querySelector(`.exercise-card[data-id="${exId}"]`);
  if (card) {
    const body = card.querySelector('.card-body, .wk-card-body');
    if (body) body.innerHTML = html;
  }
}

function expandCard(exId, day) {
  expandedCards[exId + day] = true;
  refreshCardBody(exId, day);
}

function collapseCard(exId, day) {
  expandedCards[exId + day] = false;
  refreshCardBody(exId, day);
}

// Collapsed mode: update all sets to the same weight/reps
function updateEntry(exId, day, field, val) {
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  S.session[day][exId] = migrateEntry(S.session[day][exId]);
  const parsed = val === '' ? '' : parseFloat(val) || val;
  S.session[day][exId].forEach(s => s[field] = parsed);
  save();
}

function changeSetCount(exId, day, delta) {
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  S.session[day][exId] = migrateEntry(S.session[day][exId]);
  const sets = S.session[day][exId];
  const next = Math.max(1, Math.min(20, sets.length + delta));
  if (delta > 0) {
    const last = sets.slice(-1)[0] || { weight: '', reps: '' };
    sets.push({ weight: last.weight, reps: last.reps });
  } else if (delta < 0) {
    sets.pop();
  }
  save();
  const scope = WK.day ? document.getElementById('wk-scroll') : document;
  const el = scope.querySelector(`#sets-count-${exId}-${day}, [id="sets-count-${exId}-${day}"]`);
  if (el) el.textContent = next;
}

// Expanded mode: update individual set
function updateSetEntry(exId, day, idx, field, val) {
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  S.session[day][exId][idx][field] = val === '' ? '' : parseFloat(val) || val;
  save();
}

function addSet(exId, day) {
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  const last = S.session[day][exId].slice(-1)[0] || { weight: '', reps: '' };
  S.session[day][exId].push({ weight: last.weight, reps: last.reps });
  save();
  refreshCardBody(exId, day);
}

function removeSet(exId, day, idx) {
  if (!S.session[day][exId] || S.session[day][exId].length <= 1) return;
  S.session[day][exId].splice(idx, 1);
  save();
  refreshCardBody(exId, day);
}

// ── Day actions ────────────────────────────────────────────────────────────
function switchDay(day) { S.activeDay = day; render(); }

function logWorkout(day) {
  const logged = {};
  S.split[day].forEach(exId => {
    const entry = migrateEntry(S.session[day][exId] || []);
    const valid = entry.filter(s => s.weight !== '' || s.reps !== '');
    if (!valid.length) return;
    logged[exId] = valid;
  });
  if (!Object.keys(logged).length) { showToast('Enter weight/reps before logging','error'); return; }

  const prs = [];
  Object.keys(logged).forEach(exId => {
    const maxW = parseFloat(logged[exId][0]?.weight)||0;
    if (maxW > 0 && maxW > getPR(exId)) prs.push((S.bank[exId]?.name||exId)+' '+maxW+'lb');
  });

  S.history.push({ id:Date.now().toString(), day, date:today(), exercises:logged });
  S.session[day] = {};
  save(); render();
  if (prs.length) showToast('🏆 New PR: '+prs[0],'success');
  else showToast('Workout logged! 💪','success');
}

function clearDay(day) {
  if (!confirm("Clear today's unsaved session data?")) return;
  S.session[day] = {};
  save(); render();
}

function removeFromDay(exId, day) {
  S.split[day] = S.split[day].filter(id => id!==exId);
  delete S.session[day][exId];
  save(); render();
}

// ── Session history ────────────────────────────────────────────────────────
function sessionHistoryHTML(day, sessions) {
  if (!sessions.length) return `
    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">Session History</div>
      <div class="section-divider-line"></div>
    </div>
    <div class="empty-state" style="padding:32px 24px">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No sessions logged yet</div>
    </div>`;

  const PREVIEW = 5;
  const showAll = showAllHistory[day];
  const visible = showAll ? sessions : sessions.slice(0,PREVIEW);
  const moreBtn = !showAll && sessions.length > PREVIEW
    ? `<button class="history-show-more" onclick="toggleShowAll('${day}')">Show all ${sessions.length} sessions</button>`
    : showAll && sessions.length > PREVIEW
    ? `<button class="history-show-more" onclick="toggleShowAll('${day}')">Show less</button>`
    : '';

  return `
    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">Session History</div>
      <span class="history-count-badge">${sessions.length}</span>
      <div class="section-divider-line"></div>
    </div>
    <div>${visible.map(s => sessionRowHTML(s)).join('')}${moreBtn}</div>`;
}

function sessionRowHTML(session) {
  const isOpen = !!openSessions[session.id];
  const exIds  = Object.keys(session.exercises);
  const DAY_COLOR = { push:'var(--push)', pull:'var(--pull)', legs:'var(--legs)', arms:'var(--arms)' };
  const DAY_LABEL = { push:'Push', pull:'Pull', legs:'Legs', arms:'Arms' };
  const dayColor = DAY_COLOR[session.day] || 'var(--primary)';
  const dayLabel = DAY_LABEL[session.day] || session.day || '';
  const dayPill = dayLabel ? `<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;background:${dayColor}22;color:${dayColor};border:1px solid ${dayColor}44">${dayLabel}</span>` : '';
  const bodyHTML = isOpen ? sessionBodyHTML(session) : '';
  const footHTML = isOpen ? sessionFooterHTML(session, false) : '';

  return `
    <div class="session-item ${isOpen?'open':''}" id="srow-${session.id}">
      <div class="session-item-header" onclick="toggleSession('${session.id}')">
        <div style="display:flex;flex-direction:column;gap:3px;flex:1">
          <div class="session-date-label">${formatDate(session.date)}</div>
          ${dayPill}
        </div>
        <div style="font-size:11px;color:var(--muted);flex-shrink:0">${exIds.length} exercises</div>
        <div class="session-chevron">${svg(ICO.chev,13)}</div>
      </div>
      <div class="session-body" id="sbody-${session.id}">${bodyHTML}</div>
      <div id="sfoot-${session.id}">${footHTML}</div>
    </div>`;
}

let editingSessions = {};

function sessionBodyHTML(session, editing=false) {
  const rows = Object.keys(session.exercises).map(exId => {
    const ex   = S.bank[exId];
    const sets = session.exercises[exId]||[];
    const w    = parseFloat(sets[0]?.weight)||0;
    const r    = parseInt(sets[0]?.reps)||0;
    const n    = sets.length;
    const isPR = isFirstPR(exId, session.id, w);

    if (editing) {
      const bodyHtml = sessionEditCardBodyHTML(sets, session.id, exId);
      const isFlaggedEdit = !!S.flaggedForIncrease?.[exId];
      return `
        <div class="session-ex-row" data-exid="${exId}">
          <div class="session-ex-header">
            <div class="drag-handle" style="margin-right:6px">${svg(ICO.drag,14)}</div>
            <div class="session-ex-name">${ex?ex.name:exId}</div>
            <div style="display:flex;gap:5px;align-items:center">
              <button class="icon-btn" onclick="toggleFlagIncreaseSession('${exId}','${session.id}')" title="${isFlaggedEdit ? 'Remove flag' : 'Flag for weight increase next session'}" style="width:24px;height:24px;${isFlaggedEdit ? 'color:var(--orange);border-color:var(--orange)' : ''}">${svg(ICO.arrowUp,11)}</button>
              <button class="btn-save-date" onclick="openSessionBankModal('${session.id}','${exId}')">Swap</button>
              <button class="btn-danger-sm" onclick="removeSessionExercise('${session.id}','${exId}')">Remove</button>
            </div>
          </div>
          <div class="sedit-body" data-sid="${session.id}" data-exid="${exId}" style="margin-top:8px">${bodyHtml}</div>
        </div>`;
    }

    return `
      <div class="session-ex-row">
        <div class="session-ex-header">
          <div class="session-ex-name">${ex?ex.name:exId}${isPR?'<span class="pr-tag">PR</span>':''}</div>
          <div class="session-ex-stats">${n} × ${w}lb × ${r} reps</div>
        </div>
      </div>`;
  }).join('');

  return rows;
}

function sessionFooterHTML(session, editing) {
  if (editing) return `
    <div class="session-footer" style="flex-wrap:wrap;gap:8px">
      <div class="session-date-edit">
        <span style="font-size:11px;color:var(--muted)">Date:</span>
        <input class="date-input-inline" type="date" id="date-edit-${session.id}" value="${session.date}">
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="btn-save-date" onclick="openSessionBankModal('${session.id}',null)">+ Add</button>
        <button class="btn-save-date" onclick="saveSessionEdits('${session.id}')">Save</button>
        <button class="btn-danger-sm" onclick="cancelSessionEdit('${session.id}')">Cancel</button>
      </div>
    </div>`;
  return `
    <div class="session-footer">
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-save-date" onclick="startSessionEdit('${session.id}')">Edit</button>
        <button class="btn-save-date" onclick="viewSessionSummary('${session.id}')">Summary</button>
        <button class="btn-danger-sm" onclick="deleteSession('${session.id}')">Delete</button>
      </div>
    </div>`;
}

function setSessionView(id, editing) {
  const s = S.history.find(h => h.id===id); if (!s) return;
  const body = document.getElementById(`sbody-${id}`);
  const foot = document.getElementById(`sfoot-${id}`);
  if (body) { body.innerHTML = sessionBodyHTML(s, editing); if (editing) attachCardBodyTouchHandler(body); }
  if (foot) foot.innerHTML = sessionFooterHTML(s, editing);
  if (editing) initSessionSortable(id, s);
}

function startSessionEdit(id) {
  editingSessions[id] = true;
  setSessionView(id, true);
}

function initSessionSortable(sessionId, session) {
  const container = document.getElementById(`sbody-${sessionId}`);
  if (!container) return;
  Sortable.create(container, {
    animation: 140,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    filter: '.session-footer',
    onEnd() {
      // Rebuild exercises object in new order
      const newOrder = [...container.querySelectorAll('.session-ex-row[data-exid]')]
        .map(el => el.dataset.exid);
      const reordered = {};
      newOrder.forEach(id => { if (session.exercises[id]) reordered[id] = session.exercises[id]; });
      // Keep any remaining (shouldn't be any, but safety)
      Object.keys(session.exercises).forEach(id => { if (!reordered[id]) reordered[id] = session.exercises[id]; });
      session.exercises = reordered;
    }
  });
}

function cancelSessionEdit(id) {
  editingSessions[id] = false;
  setSessionView(id, false);
}

function refreshSessionEditBody(sessionId) {
  setSessionView(sessionId, true);
}


function removeSessionExercise(sessionId, exId) {
  const s = S.history.find(h => h.id===sessionId); if (!s) return;
  delete s.exercises[exId];
  refreshSessionEditBody(sessionId);
}

function saveSessionEdits(id) {
  const s = S.history.find(h => h.id===id); if (!s) return;
  // Save date
  const dateInput = document.getElementById(`date-edit-${id}`);
  if (dateInput?.value) s.date = dateInput.value;
  // Flush all set inputs directly from DOM — don't rely on onchange firing on mobile
  document.querySelectorAll(`#sbody-${id} .sedit-body`).forEach(body => {
    const sessionId = body.dataset.sid;
    const exId = body.dataset.exid;
    if (!s.exercises[exId]) return;
    const rows = body.querySelectorAll('.set-row');
    if (rows.length === 0) return;
    // collapsed view: single row applies to all sets
    const isExpanded = rows.length > 0 && body.querySelector('.set-row-label') !== null;
    if (isExpanded) {
      rows.forEach((row, i) => {
        if (!s.exercises[exId][i]) return;
        const [wInput, rInput] = row.querySelectorAll('input.set-input');
        if (wInput) s.exercises[exId][i].weight = wInput.value === '' ? '' : parseFloat(wInput.value) || wInput.value;
        if (rInput) s.exercises[exId][i].reps   = rInput.value === '' ? '' : parseFloat(rInput.value) || rInput.value;
      });
    } else {
      const [wInput, rInput] = body.querySelectorAll('input.set-input');
      if (wInput) s.exercises[exId].forEach(set => { set.weight = wInput.value === '' ? '' : parseFloat(wInput.value) || wInput.value; });
      if (rInput) s.exercises[exId].forEach(set => { set.reps   = rInput.value === '' ? '' : parseFloat(rInput.value) || rInput.value; });
    }
  });
  editingSessions[id] = false;
  openSessions[id] = false;
  save();
  const row  = document.getElementById(`srow-${id}`);
  const body = document.getElementById(`sbody-${id}`);
  const foot = document.getElementById(`sfoot-${id}`);
  if (row)  row.classList.remove('open');
  if (body) body.innerHTML = '';
  if (foot) foot.innerHTML = '';
  showToast('Session saved', 'success');
}

function toggleSession(id) {
  openSessions[id] = !openSessions[id];
  const row  = document.getElementById(`srow-${id}`);
  const body = document.getElementById(`sbody-${id}`);
  const foot = document.getElementById(`sfoot-${id}`);
  if (!row||!body) return;
  row.classList.toggle('open', openSessions[id]);
  if (openSessions[id]) {
    setSessionView(id, !!editingSessions[id]);
    setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  } else {
    body.innerHTML = '';
    if (foot) foot.innerHTML = '';
  }
}

function deleteSession(id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  S.history = S.history.filter(h => h.id!==id);
  delete openSessions[id];
  save(); render();
}

function saveSessionDate(id) {
  const input = document.getElementById(`date-edit-${id}`);
  if (!input || !input.value) return;
  const session = S.history.find(h => h.id===id);
  if (!session) return;
  session.date = input.value;
  save(); render();
  showToast('Date updated','success');
}

function toggleShowAll(day) { showAllHistory[day]=!showAllHistory[day]; render(); }

// ── Bank modal ─────────────────────────────────────────────────────────────
function openSessionBankModal(sessionId, swapOutId) {
  BM.sessionId=sessionId; BM.targetId=swapOutId||null; BM.targetDay=null; BM.filter='all'; BM.selectedId=null; BM.openDescId=null;
  document.getElementById('modal-title').textContent = swapOutId ? 'Swap Exercise' : 'Add Exercise';
  document.getElementById('bank-search').value = '';
  const footer = document.getElementById('bank-footer');
  if (footer) footer.style.display = 'none';
  const swapBtn = document.getElementById('bank-swap-btn');
  if (swapBtn) swapBtn.style.display = 'none';
  document.getElementById('swap-picker').style.display = 'none';
  renderBankFilters(); renderBankGrid();
  document.getElementById('bank-modal').classList.add('open');
}

function openBankModal(targetId, day) {
  BM.sessionId=null; BM.targetId=targetId; BM.targetDay=day; BM.filter='all'; BM.selectedId=null; BM.openDescId=null;
  document.getElementById('modal-title').textContent = targetId ? 'Swap Exercise' : 'Add Exercise';
  document.getElementById('bank-search').value = '';
  const footer = document.getElementById('bank-footer');
  if (footer) footer.style.display = 'none';
  const swapBtn = document.getElementById('bank-swap-btn');
  if (swapBtn) swapBtn.style.display = 'none';
  document.getElementById('swap-picker').style.display = 'none';
  renderBankFilters(); renderBankGrid();
  document.getElementById('bank-modal').classList.add('open');
}
function closeBankModal() {
  document.getElementById('bank-modal').classList.remove('open');
  document.getElementById('swap-picker').style.display = 'none';
}

// Keep bank modal above keyboard on iOS
function handleModalBackdrop(e) { if(e.target.classList.contains('modal-overlay')) closeBankModal(); }

function renderBankFilters() {
  const keys = ['all','chest','back','shoulders','biceps','triceps','legs','glutes','core','full body'];
  document.getElementById('bank-filters').innerHTML = keys.map(k =>
    `<button class="filter-pill ${k===BM.filter?'active':''}" onclick="setBankFilter('${k}')">${MG_LABELS[k]}</button>`
  ).join('');
}
function setBankFilter(cat) { BM.filter=cat; BM.openDescId=null; renderBankFilters(); renderBankGrid(); }

function renderBankGrid() {
  const query = (document.getElementById('bank-search')?.value||'').toLowerCase().trim();
  const split = S.split[BM.targetDay]||[];
  let exs = Object.values(S.bank).sort((a,b) => {
    const mg=(a.muscleGroup||'').localeCompare(b.muscleGroup||'');
    return mg!==0 ? mg : a.name.localeCompare(b.name);
  });
  if (BM.filter!=='all') exs = exs.filter(e => e.muscleGroup===BM.filter);
  if (query) exs = exs.filter(e => e.name.toLowerCase().includes(query)||(e.muscleGroup||'').includes(query));

  // Custom exercises are those not in DEFAULT_BANK
  const isCustom = ex => !DEFAULT_BANK[ex.id];

  const items = exs.map(ex => {
    const isSel = ex.id===BM.selectedId;
    const inDay = (split.includes(ex.id)||ex.id===BM.targetId)&&!isSel;
    const delBtn = isCustom(ex)
      ? `<button class="bank-item-delete" onclick="event.stopPropagation();deleteExercise('${ex.id}')" title="Delete">${svg(ICO.close,10)}</button>`
      : '';
    const infoBtn = ex.desc
      ? `<button class="bank-item-info${isCustom(ex)?'':' solo'}" onclick="event.stopPropagation();toggleBankDesc('${ex.id}')" title="About">${svg(ICO.info,11)}</button>`
      : '';
    const descPanel = ex.desc
      ? `<div class="bank-item-desc" id="bdesc-${ex.id}" onclick="closeBankDesc();event.stopPropagation()">${ex.desc}${ex.caliUrl?`<br><a class="desc-src" href="${ex.caliUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View on Calistree ↗</a>`:''}</div>`
      : '';
    return `
      <div class="bank-item ${isSel?'selected':inDay?'in-day':''}" data-exid="${ex.id}">
        <div class="bank-item-name" style="padding-right:${ex.desc?(isCustom(ex)?'40px':'22px'):'8px'}">${ex.name}</div>
        <div class="bank-mg">${MG_LABELS[ex.muscleGroup]||ex.muscleGroup||''}</div>
        ${infoBtn}${delBtn}
        ${descPanel}
      </div>`;
  }).join('');

  const addCard = `
    <div class="bank-add-card">
      <div class="bank-add-card-title">Add Custom Exercise</div>
      <input class="bank-input" id="new-ex-name" type="text" placeholder="Exercise name…" onkeydown="if(event.key==='Enter') addCustomExercise()">
      <select class="bank-select" id="new-ex-mg">
        <option value="chest">Chest</option>
        <option value="back">Back</option>
        <option value="shoulders">Shoulders</option>
        <option value="biceps">Biceps</option>
        <option value="triceps">Triceps</option>
        <option value="legs">Legs</option>
        <option value="glutes">Glutes</option>
        <option value="core">Core</option>
        <option value="full body">Full Body</option>
      </select>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addCustomExercise()">+ Add Exercise</button>
    </div>`;

  const grid = document.getElementById('bank-grid');
  grid.innerHTML = (items || `<div class="bank-empty">No exercises found</div>`) + addCard;

  // Re-attach touchend delegate each render (iOS: touchend fires instantly,
  // click in overflow:auto containers requires a second tap)
  grid._touchHandler && grid.removeEventListener('touchend', grid._touchHandler);
  grid._touchHandler = function(e) {
    const item = e.target.closest('.bank-item');
    if (!item) return;
    if (e.target.closest('.bank-item-info, .bank-item-delete, .bank-item-desc, .cali-link, .desc-src')) return;
    e.preventDefault();
    selectExercise(item.dataset.exid);
  };
  grid.addEventListener('touchend', grid._touchHandler, { passive: false });
}

function closeBankDesc() {
  if (!BM.openDescId) return;
  const panel = document.getElementById(`bdesc-${BM.openDescId}`);
  if (panel) panel.classList.remove('open');
  const item = panel?.closest?.('.bank-item');
  if (item) { const btn = item.querySelector('.bank-item-info'); if (btn) btn.style.color = ''; }
  BM.openDescId = null;
}

function toggleBankDesc(exId) {
  // Always select this exercise when its info is tapped
  if (BM.selectedId !== exId) selectExercise(exId);
  if (BM.openDescId === exId) { closeBankDesc(); return; }
  closeBankDesc();
  const panel = document.getElementById(`bdesc-${exId}`);
  if (!panel) return;
  panel.classList.add('open');
  const btn = panel.closest('.bank-item')?.querySelector('.bank-item-info');
  if (btn) btn.style.color = 'var(--primary)';
  BM.openDescId = exId;
}

function deleteExercise(exId) {
  if (!confirm(`Delete "${S.bank[exId]?.name}"? This cannot be undone.`)) return;
  // Remove from all day splits and sessions
  ['push','pull','legs','arms'].forEach(day => {
    S.split[day] = S.split[day].filter(id => id !== exId);
    delete S.session[day][exId];
  });
  delete S.bank[exId];
  save();
  renderBankGrid();
  showToast('Exercise deleted', 'success');
}

function selectExercise(exId) {
  // Tap again on already-selected pill → deselect
  if (BM.selectedId === exId) {
    BM.selectedId = null;
    document.querySelectorAll('#bank-grid .bank-item').forEach(el => el.classList.remove('selected'));
    const footer = document.getElementById('bank-footer');
    if (footer) footer.style.display = 'none';
    return;
  }

  // Close desc of any OTHER exercise
  if (BM.openDescId && BM.openDescId !== exId) closeBankDesc();

  BM.selectedId = exId;

  // Deselect all, select this one
  document.querySelectorAll('#bank-grid .bank-item').forEach(el => {
    el.classList.remove('selected');
    if (el.dataset.exid === exId) el.classList.add('selected');
  });

  const footer  = document.getElementById('bank-footer');
  const addBtn  = document.getElementById('bank-add-btn');
  const swapBtn = document.getElementById('bank-swap-btn');
  if (!footer) return;
  const ex = S.bank[exId];
  if (addBtn) addBtn.textContent = ex ? `+ Add ${ex.name}` : '+ Add';

  // Show swap if there are exercises to swap with (day split or session)
  let swappable = [];
  if (BM.sessionId) {
    const s = S.history.find(h => h.id === BM.sessionId);
    swappable = Object.keys(s?.exercises || {}).filter(id => id !== exId);
  } else if (BM.targetDay) {
    swappable = (S.split[BM.targetDay] || []).filter(id => id !== exId);
  }
  if (swapBtn) {
    swapBtn.textContent = `⇄ Swap`;
    swapBtn.style.display = swappable.length > 0 ? '' : 'none';
  }
  footer.style.display = 'block';
}

function confirmBankSelection() {
  const exId = BM.selectedId;
  if (!exId) return;

  // Session edit mode
  if (BM.sessionId) {
    const s = S.history.find(h => h.id === BM.sessionId); if (!s) return;
    if (BM.targetId) {
      const existing = s.exercises[BM.targetId];
      s.exercises[exId] = existing || [{ weight: '', reps: '' }];
      delete s.exercises[BM.targetId];
    } else {
      if (s.exercises[exId]) { showToast('Already in this session', 'error'); return; }
      s.exercises[exId] = [{ weight: '', reps: '' }];
    }
    const sid = BM.sessionId;
    closeBankModal();
    refreshSessionEditBody(sid);
    return;
  }

  const day = BM.targetDay;
  if (!day) return;
  if (BM.targetId) {
    const idx = S.split[day].indexOf(BM.targetId);
    if (idx !== -1) {
      S.split[day][idx] = exId;
      if (S.session[day][BM.targetId]) { S.session[day][exId] = S.session[day][BM.targetId]; delete S.session[day][BM.targetId]; }
    }
  } else {
    if (S.split[day].includes(exId)) { showToast('Already in this day', 'error'); return; }
    S.split[day].push(exId);
  }
  save(); closeBankModal(); render();
  if (WK.day) renderWorkoutCards();
}

function showSwapPicker() {
  const exId = BM.selectedId; if (!exId) return;
  const list = document.getElementById('swap-picker-list');

  let exercises = [];
  if (BM.sessionId) {
    const s = S.history.find(h => h.id === BM.sessionId);
    exercises = Object.keys(s?.exercises || {}).filter(id => id !== exId);
  } else {
    exercises = S.split[BM.targetDay||'']?.filter(id => id !== exId) || [];
  }

  if (!exercises.length) { showToast('No exercises to swap with', 'error'); return; }
  list.innerHTML = exercises.map(id => {
    const ex = S.bank[id];
    return `<div class="swap-pick-item" onclick="doSwap('${id}')">
      <span>${ex?.name || id}</span>
      <span style="font-size:11px;color:var(--muted)">${ex?.muscleGroup || ''}</span>
    </div>`;
  }).join('');
  document.getElementById('bank-footer').style.display = 'none';
  document.getElementById('swap-picker').style.display = 'block';
}

function hideSwapPicker() {
  document.getElementById('swap-picker').style.display = 'none';
  document.getElementById('bank-footer').style.display = 'block';
}

function doSwap(swapOutId) {
  const exId = BM.selectedId; if (!exId) return;

  if (BM.sessionId) {
    const s = S.history.find(h => h.id === BM.sessionId); if (!s) return;
    s.exercises[exId] = s.exercises[swapOutId] || [{ weight: '', reps: '' }];
    delete s.exercises[swapOutId];
    const sid = BM.sessionId;
    closeBankModal();
    refreshSessionEditBody(sid);
    return;
  }

  const day = BM.targetDay; if (!day) return;
  const idx = S.split[day].indexOf(swapOutId);
  if (idx !== -1) {
    S.split[day][idx] = exId;
    if (S.session[day][swapOutId]) { S.session[day][exId] = S.session[day][swapOutId]; delete S.session[day][swapOutId]; }
  }
  save(); closeBankModal(); render();
  if (WK.day) renderWorkoutCards();
}

function addCustomExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const mg   = document.getElementById('new-ex-mg').value;
  if (!name) { showToast('Enter a name','error'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')+'_'+Date.now();
  S.bank[id] = { id, name, muscleGroup:mg };
  document.getElementById('new-ex-name').value = '';
  save(); renderBankGrid();
  showToast(`"${name}" added`,'success');
}

// ── Sortable ───────────────────────────────────────────────────────────────
function initSortable(day) {
  const el = document.getElementById(`list-${day}`);
  if (!el) return;
  Sortable.create(el, {
    animation:140, handle:'.drag-handle', ghostClass:'sortable-ghost',
    onEnd(evt) {
      const arr = S.split[day];
      const [moved] = arr.splice(evt.oldIndex,1);
      arr.splice(evt.newIndex,0,moved);
      save();
    }
  });
}

function dashboardHTML() {
  const total     = S.history.length;
  const streak    = getCurrentStreak();
  const thisMonth = sessionsThisMonth();
  const byDay     = d => S.history.filter(h => h.day===d).length;

  // Most improved: biggest lb gain from first to last session per exercise
  let mostImproved = null, mostImprovedGain = 0;
  const allExIds = [...new Set(S.history.flatMap(h => Object.keys(h.exercises)))];
  allExIds.forEach(exId => {
    const sessions = getExerciseHistory(exId);
    if (sessions.length < 2) return;
    const first = parseFloat(sessions[0].exercises[exId]?.[0]?.weight)||0;
    const last  = parseFloat(sessions[sessions.length-1].exercises[exId]?.[0]?.weight)||0;
    const gain  = last - first;
    if (gain > mostImprovedGain) { mostImprovedGain = gain; mostImproved = exId; }
  });

  const exWithHistory = allExIds.map(id => S.bank[id]).filter(Boolean).sort((a,b) => a.name.localeCompare(b.name));

  return `

      <div class="stat-card">
        <div class="stat-label">Pull</div>
        <div class="stat-value" style="color:var(--pull)">${byDay('pull')}</div>
      </div>

        <div class="stat-label">Legs</div>

    ${hasData ? `

        <select class="chart-select" id="sel-weight" onchange="updateWeightChart()">${opts}</select>

      <div class="chart-header">
        <div class="chart-title">Sessions Per Week</div>
      </div>
      <canvas id="chart-freq" height="130"></canvas>
    </div>

    <!-- ── Personal Records ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Personal Records & E1RM</div>
      </div>
      ${prTableHTML()}
    </div>

    ${mostImproved ? `
    <!-- ── Most Improved ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Most Improved Exercise</div>
      </div>
      ${mostImprovedHTML(mostImproved)}
    </div>` : ''}

    ` : `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Log workouts to see your progress here</div></div>`}`;
}

function prTableHTML() {
  const allExIds = [...new Set(S.history.flatMap(h => Object.keys(h.exercises)))];
  const rows = allExIds
    .map(exId => {
      const ex = S.bank[exId]; if (!ex) return null;
      const sessions = getExerciseHistory(exId);
      if (!sessions.length) return null;
      const pr   = getPR(exId);
      const e1rm = getBest1RM(exId);
      const first = parseFloat(sessions[0].exercises[exId]?.[0]?.weight)||0;
      const gain  = pr - first;
      const lastDate = sessions[sessions.length-1].date;
      return { ex, pr, e1rm, gain, lastDate, sessions: sessions.length };
    })
    .filter(Boolean)
    .sort((a,b) => b.pr - a.pr);

  if (!rows.length) return '<p style="font-size:13px;color:var(--muted);padding:12px 0">No data yet</p>';

  return `<div class="pr-table-wrap"><table class="pr-table">
    <thead><tr><th>Exercise</th><th>PR Weight</th><th>E1RM</th><th>Gain</th><th>Sessions</th><th>Last Logged</th></tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${r.ex.name}</td>
      <td class="mono">${r.pr} lb</td>
      <td class="mono" style="color:var(--primary)">${r.e1rm} lb</td>
      <td class="mono ${r.gain>0?'pr-gain-pos':'pr-gain-neu'}">${r.gain>0?'+':''}${r.gain} lb</td>
      <td class="mono">${r.sessions}</td>
      <td>${formatDateShort(r.lastDate)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function mostImprovedHTML(exId) {
  const ex = S.bank[exId]; if (!ex) return '';
  const sessions = getExerciseHistory(exId);
  const first = parseFloat(sessions[0].exercises[exId]?.[0]?.weight)||0;
  const last  = parseFloat(sessions[sessions.length-1].exercises[exId]?.[0]?.weight)||0;
  const gain  = last - first;
  const pct   = first > 0 ? Math.round((gain/first)*100) : 0;
  return `
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div>
        <div style="font-size:20px;font-weight:700">${ex.name}</div>
        <div style="font-size:13px;color:var(--muted-light);margin-top:3px">${first} lb → ${last} lb over ${sessions.length} sessions</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-size:28px;font-weight:700;color:var(--success)">+${gain} lb</div>
        <div style="font-size:12px;color:var(--muted-light)">${pct}% increase</div>
      </div>
    </div>`;
}

function buildHistTable(exId, sessions) {
  const pr = getPR(exId);
  const rows = [...sessions].reverse().map(s => {
    const sets = s.exercises[exId]||[];
    const w    = parseFloat(sets[0]?.weight)||0;
    const r    = parseInt(sets[0]?.reps)||0;
    const n    = sets.length;
    const isPR = w > 0 && w >= pr;
    return `<tr>
      <td>${formatDate(s.date)}${isPR?'<span class="pr-tag" style="margin-left:6px">PR</span>':''}</td>
      <td class="mono">${n} sets</td>
      <td class="mono">${w} lb</td>
      <td class="mono">${r} reps</td>
    </tr>`;
  }).join('');
  return `<table class="hist-table">
    <thead><tr><th>Date</th><th>Sets</th><th>Weight</th><th>Reps</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

    legend:{ display:false },
    tooltip:{ backgroundColor:'#1c1c1c', borderColor:'#262626', borderWidth:1, titleColor:'#f1f5f9', bodyColor:'#9ca3af' }
  },
  scales:{
    x:{ grid:{ color:'#1a1a1a' }, ticks:{ color:'#4b5563', maxRotation:45 } },

function updateWeightChart() {

function update1RMChart() {
  const sel = document.getElementById('sel-1rm'); if (!sel) return;
  const sessions = getExerciseHistory(sel.value);
  const data = sessions.map(s => {
    const entry = s.exercises[sel.value]?.[0];
    return calc1RM(entry?.weight, entry?.reps);
  });
  if (charts.orm) charts.orm.destroy();
  charts.orm = new Chart(document.getElementById('chart-1rm').getContext('2d'), {
    type:'line',
    data:{
      labels: sessions.map(s => formatDateShort(s.date)),
      datasets:[{ label:'E1RM', data, borderColor:'#f472b6', backgroundColor:'rgba(244,114,182,0.1)', fill:true, tension:0.3, pointBackgroundColor:'#f472b6', pointRadius:5, pointHoverRadius:7 }]
    },
    options:{ ...CHART_OPTS, plugins:{ ...CHART_OPTS.plugins, tooltip:{ ...CHART_OPTS.plugins.tooltip,
      callbacks:{ label: ctx => ' '+ctx.parsed.y+' lb (estimated)' } } } }
  });
  // History table for 1RM
  const wrap = document.getElementById('hist-1rm-wrap');
  if (wrap) {
    const pr = getPR(sel.value);
    const tableRows = [...sessions].reverse().map(s => {
      const entry = s.exercises[sel.value]?.[0];

      <tbody>${tableRows}</tbody>
    </table>`;

}

function buildFreqChart() {
  // Group sessions by week (Mon–Sun) for the past 12 weeks
  const weekMap = {};
  S.history.forEach(h => {
    const lbl = getWeekLabel(h.date);
    weekMap[lbl] = (weekMap[lbl]||0) + 1;
  });
  // Build ordered weeks
  const now = new Date();
  const labels = [], data = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - now.getDay() - (i*7) + 1);
    const lbl = d.toLocaleDateString('en-US',{ month:'short', day:'numeric' });
    labels.push(lbl);
    data.push(weekMap[lbl]||0);
  }
  if (charts.freq) charts.freq.destroy();
  charts.freq = new Chart(document.getElementById('chart-freq').getContext('2d'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'Sessions', data, backgroundColor:'rgba(129,140,248,0.5)', borderColor:'#818cf8', borderWidth:1, borderRadius:4 }] },
    options:{ ...CHART_OPTS, scales:{ ...CHART_OPTS.scales, y:{ ...CHART_OPTS.scales.y, ticks:{ ...CHART_OPTS.scales.y.ticks, stepSize:1 } } },
      plugins:{ ...CHART_OPTS.plugins, tooltip:{ ...CHART_OPTS.plugins.tooltip, callbacks:{ label: ctx => ' '+ctx.parsed.y+' session'+(ctx.parsed.y!==1?'s':'') } } } }
  });
}

// ACTIVE WORKOUT

let WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };

function startWorkout(day) {
  WK.day = day;
  WK.startTime = Date.now();
  WK.done = {};
  WK.paused = false;
  WK.pausedElapsed = 0;
  // Seed session entries with defaults if empty
  S.split[day].forEach(id => {
    if (!S.session[day][id]) S.session[day][id] = getDefaultEntry(id, day);
  });
  resumeWorkoutUI(day);
  saveWK();
}

function resumeWorkoutUI(day) {
  const LABEL = { push:'Push Day', pull:'Pull Day', legs:'Leg Day', arms:'Arms Day' };
  document.getElementById('wk-title').textContent = LABEL[day];
  document.getElementById('workout-overlay').style.display = 'flex';
  renderWorkoutCards();
  clearInterval(WK.timerInterval);
  WK.timerInterval = setInterval(tickTimer, 1000);
  BM.targetDay = day;
  // Wire minimize button with both click and touchend for iOS reliability
  const minBtn = document.getElementById('wk-minimize-btn');
  if (minBtn) {
    minBtn.onclick = minimizeWorkout;
    minBtn.ontouchend = function(e) { e.preventDefault(); minimizeWorkout(); };
  }
}

function tickTimer() {
  if (WK.paused) return;
  const elapsed = WK.pausedElapsed + Math.floor((Date.now() - WK.startTime) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  const timeStr = `${m}:${s.toString().padStart(2,'0')}`;
  const el = document.getElementById('wk-timer');
  if (el) el.textContent = timeStr;
  const bannerTimer = document.getElementById('wk-banner-timer');
  if (bannerTimer) bannerTimer.textContent = timeStr;
}

function minimizeWorkout() {
  document.getElementById('workout-overlay').style.display = 'none';
  const banner = document.getElementById('wk-banner');
  banner.style.display = 'block';
  document.getElementById('wk-banner-title').textContent = document.getElementById('wk-title').textContent;
  tickTimer();
}

function maximizeWorkout() {
  document.getElementById('wk-banner').style.display = 'none';
  document.getElementById('workout-overlay').style.display = 'flex';
}

function togglePauseWorkout() {
  if (WK.paused) {
    WK.paused = false;
    WK.startTime = Date.now();
    document.getElementById('wk-pause-icon')?.innerHTML && (document.getElementById('wk-pause-icon').innerHTML = svg(ICO.pause, 13));
    document.getElementById('wk-pause-label') && (document.getElementById('wk-pause-label').textContent = 'Pause');
    document.getElementById('wk-paused-label') && (document.getElementById('wk-paused-label').style.display = 'none');
  } else {
    WK.pausedElapsed += Math.floor((Date.now() - WK.startTime) / 1000);
    WK.paused = true;
    document.getElementById('wk-pause-icon') && (document.getElementById('wk-pause-icon').innerHTML = svg(ICO.play, 13));
    document.getElementById('wk-pause-label') && (document.getElementById('wk-pause-label').textContent = 'Resume');
    document.getElementById('wk-paused-label') && (document.getElementById('wk-paused-label').style.display = 'block');
  }
  saveWK();
}

function cancelWorkout() {
  if (!confirm('Cancel this workout? Your exercise data will not be lost.')) return;
  clearInterval(WK.timerInterval);
  clearWK();
  document.getElementById('workout-overlay').style.display = 'none';
  document.getElementById('wk-banner').style.display = 'none';
  WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };
}

function renderWorkoutCards() {
  const day = WK.day;
  const last = getLastSession(day);
  const cards = S.split[day].map(id => workoutCardHTML(id, day, last)).join('');
  const scroll = document.getElementById('wk-scroll');
  scroll.innerHTML = timerCardHTML() + (cards || '<div class="empty-state">No exercises — tap + Add</div>');

let _wkSortable = null;
let _reorderDay = null;
function openReorder(day) {
  _reorderDay = day;
