      <div class="stat-sub">last ${DAY_LABEL[d].toLowerCase()} session</div>
    </div>`;
  }).join('');

  return `
    <div class="day-header">
      <div>
        <div class="day-title" style="color:var(--dash)">Dashboard</div>
        <div class="day-subtitle">Your progress over time</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;margin-top:4px">
        <button class="btn btn-ghost" style="padding:7px 12px;font-size:12px" onclick="exportData()">Export</button>
        <button class="btn btn-ghost" style="padding:7px 12px;font-size:12px" onclick="importData()">Import</button>
      </div>
    </div>

    <!-- ── Top stats ── -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Sessions</div>
        <div class="stat-value" style="color:var(--primary)">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value" style="color:var(--primary)">${thisMonth}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Streak</div>
        <div class="stat-value" style="color:var(--orange)">${streak}</div>
        <div class="stat-sub">day${streak!==1?'s':''} in a row</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Push</div>
        <div class="stat-value" style="color:var(--push)">${byDay('push')}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pull</div>
        <div class="stat-value" style="color:var(--pull)">${byDay('pull')}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Legs</div>
        <div class="stat-value" style="color:var(--legs)">${byDay('legs')}</div>
      </div>
    </div>

    <!-- ── Days since last trained ── -->
    <div style="margin-bottom:20px">
      <div class="section-divider" style="margin-top:0;margin-bottom:12px">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">Days Since Last Trained</div>
        <div class="section-divider-line"></div>
      </div>
      <div class="stats-grid">${daysSincePanels}</div>
    </div>

    ${hasData ? `
    <!-- ── Max Weight Over Time ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Max Weight Over Time</div>
        <select class="chart-select" id="sel-weight" onchange="updateWeightChart()">${opts}</select>
      </div>
      <canvas id="chart-weight" height="160"></canvas>
      <div class="hist-table-wrap" id="hist-table-wrap"></div>
    </div>

    <!-- ── Estimated 1-Rep Max ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Estimated 1-Rep Max</div>
        <select class="chart-select" id="sel-1rm" onchange="update1RMChart()">${opts}</select>
      </div>
      <canvas id="chart-1rm" height="160"></canvas>
      <div class="hist-table-wrap" id="hist-1rm-wrap"></div>
    </div>

    <!-- ── Sessions Per Week ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Sessions Per Week</div>
      </div>
      <canvas id="chart-freq" height="130"></canvas>
    </div>

    <!-- ── Personal Records ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Personal Records & E1RM</div>
      </div>
      ${prTableHTML()}
    </div>

    ${mostImproved ? `
    <!-- ── Most Improved ── -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Most Improved Exercise</div>
      </div>
      ${mostImprovedHTML(mostImproved)}
    </div>` : ''}

    ` : `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Log workouts to see your progress here</div></div>`}`;
}

function prTableHTML() {
  const allExIds = [...new Set(S.history.flatMap(h => Object.keys(h.exercises)))];
  const rows = allExIds
    .map(exId => {
      const ex = S.bank[exId]; if (!ex) return null;
      const sessions = getExerciseHistory(exId);
      if (!sessions.length) return null;
      const pr   = getPR(exId);
      const e1rm = getBest1RM(exId);
      const first = parseFloat(sessions[0].exercises[exId]?.[0]?.weight)||0;
      const gain  = pr - first;
      const lastDate = sessions[sessions.length-1].date;
      return { ex, pr, e1rm, gain, lastDate, sessions: sessions.length };
    })
    .filter(Boolean)
    .sort((a,b) => b.pr - a.pr);

  if (!rows.length) return '<p style="font-size:13px;color:var(--muted);padding:12px 0">No data yet</p>';

  return `<div class="pr-table-wrap"><table class="pr-table">
    <thead><tr><th>Exercise</th><th>PR Weight</th><th>E1RM</th><th>Gain</th><th>Sessions</th><th>Last Logged</th></tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${r.ex.name}</td>
      <td class="mono">${r.pr} lb</td>
      <td class="mono" style="color:var(--primary)">${r.e1rm} lb</td>
      <td class="mono ${r.gain>0?'pr-gain-pos':'pr-gain-neu'}">${r.gain>0?'+':''}${r.gain} lb</td>
      <td class="mono">${r.sessions}</td>
      <td>${formatDateShort(r.lastDate)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function mostImprovedHTML(exId) {
  const ex = S.bank[exId]; if (!ex) return '';
  const sessions = getExerciseHistory(exId);
  const first = parseFloat(sessions[0].exercises[exId]?.[0]?.weight)||0;
  const last  = parseFloat(sessions[sessions.length-1].exercises[exId]?.[0]?.weight)||0;
  const gain  = last - first;
  const pct   = first > 0 ? Math.round((gain/first)*100) : 0;
  return `
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div>
        <div style="font-size:20px;font-weight:700">${ex.name}</div>
        <div style="font-size:13px;color:var(--muted-light);margin-top:3px">${first} lb → ${last} lb over ${sessions.length} sessions</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-size:28px;font-weight:700;color:var(--success)">+${gain} lb</div>
        <div style="font-size:12px;color:var(--muted-light)">${pct}% increase</div>
      </div>
    </div>`;
}

function buildHistTable(exId, sessions) {
  const pr = getPR(exId);
  const rows = [...sessions].reverse().map(s => {
    const sets = s.exercises[exId]||[];
    const w    = parseFloat(sets[0]?.weight)||0;
    const r    = parseInt(sets[0]?.reps)||0;
    const n    = sets.length;
    const isPR = w > 0 && w >= pr;
    return `<tr>
      <td>${formatDate(s.date)}${isPR?'<span class="pr-tag" style="margin-left:6px">PR</span>':''}</td>
      <td class="mono">${n} sets</td>
      <td class="mono">${w} lb</td>
      <td class="mono">${r} reps</td>
    </tr>`;
  }).join('');
  return `<table class="hist-table">
    <thead><tr><th>Date</th><th>Sets</th><th>Weight</th><th>Reps</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

const CHART_OPTS = {
  responsive:true,
  plugins:{
    legend:{ display:false },
    tooltip:{ backgroundColor:'#1c1c1c', borderColor:'#262626', borderWidth:1, titleColor:'#f1f5f9', bodyColor:'#9ca3af' }
  },
  scales:{
    x:{ grid:{ color:'#1a1a1a' }, ticks:{ color:'#4b5563', maxRotation:45 } },
    y:{ grid:{ color:'#1a1a1a' }, ticks:{ color:'#4b5563' } }
  }
};

function initCharts() {
  if (document.getElementById('chart-weight')) {
    updateWeightChart();
    update1RMChart();
    buildFreqChart();
  }
}

function updateWeightChart() {
  const sel = document.getElementById('sel-weight'); if(!sel) return;
  const sessions = getExerciseHistory(sel.value);
  const data = sessions.map(s => parseFloat(s.exercises[sel.value]?.[0]?.weight)||0);
  if (charts.weight) charts.weight.destroy();
  charts.weight = new Chart(document.getElementById('chart-weight').getContext('2d'), {
    type:'line',
    data:{
      labels: sessions.map(s => formatDateShort(s.date)),
      datasets:[{ label:'Weight', data, borderColor:'#818cf8', backgroundColor:'rgba(129,140,248,0.1)', fill:true, tension:0.3, pointBackgroundColor:'#818cf8', pointRadius:5, pointHoverRadius:7 }]
    },
    options:{ ...CHART_OPTS, plugins:{ ...CHART_OPTS.plugins, tooltip:{ ...CHART_OPTS.plugins.tooltip,
      callbacks:{ label: ctx => ' '+ctx.parsed.y+' lb' } } } }
  });
  const wrap = document.getElementById('hist-table-wrap');
  if (wrap) wrap.innerHTML = buildHistTable(sel.value, sessions);
}

function update1RMChart() {
  const sel = document.getElementById('sel-1rm'); if (!sel) return;
  const sessions = getExerciseHistory(sel.value);
  const data = sessions.map(s => {
    const entry = s.exercises[sel.value]?.[0];
    return calc1RM(entry?.weight, entry?.reps);
  });
  if (charts.orm) charts.orm.destroy();
  charts.orm = new Chart(document.getElementById('chart-1rm').getContext('2d'), {
    type:'line',
    data:{
      labels: sessions.map(s => formatDateShort(s.date)),
      datasets:[{ label:'E1RM', data, borderColor:'#f472b6', backgroundColor:'rgba(244,114,182,0.1)', fill:true, tension:0.3, pointBackgroundColor:'#f472b6', pointRadius:5, pointHoverRadius:7 }]
    },
    options:{ ...CHART_OPTS, plugins:{ ...CHART_OPTS.plugins, tooltip:{ ...CHART_OPTS.plugins.tooltip,
      callbacks:{ label: ctx => ' '+ctx.parsed.y+' lb (estimated)' } } } }
  });
  // History table for 1RM
  const wrap = document.getElementById('hist-1rm-wrap');
  if (wrap) {
    const pr = getPR(sel.value);
    const tableRows = [...sessions].reverse().map(s => {
      const entry = s.exercises[sel.value]?.[0];
      const w = parseFloat(entry?.weight)||0;
      const r = parseInt(entry?.reps)||0;
      const e1rm = calc1RM(w, r);
      const isPR = w > 0 && w >= pr;
      return `<tr>
        <td>${formatDate(s.date)}${isPR?'<span class="pr-tag" style="margin-left:6px">PR</span>':''}</td>
        <td class="mono">${w} lb × ${r} reps</td>
        <td class="mono" style="color:var(--dash)">${e1rm} lb</td>
      </tr>`;
    }).join('');
    wrap.innerHTML = `<table class="hist-table">
      <thead><tr><th>Date</th><th>Logged</th><th>E1RM</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
  }
}

function buildFreqChart() {
  // Group sessions by week (Mon–Sun) for the past 12 weeks
  const weekMap = {};
  S.history.forEach(h => {
    const lbl = getWeekLabel(h.date);
    weekMap[lbl] = (weekMap[lbl]||0) + 1;
  });
  // Build ordered weeks
  const now = new Date();
  const labels = [], data = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - now.getDay() - (i*7) + 1);
    const lbl = d.toLocaleDateString('en-US',{ month:'short', day:'numeric' });
    labels.push(lbl);
    data.push(weekMap[lbl]||0);
  }
  if (charts.freq) charts.freq.destroy();
  charts.freq = new Chart(document.getElementById('chart-freq').getContext('2d'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'Sessions', data, backgroundColor:'rgba(129,140,248,0.5)', borderColor:'#818cf8', borderWidth:1, borderRadius:4 }] },
    options:{ ...CHART_OPTS, scales:{ ...CHART_OPTS.scales, y:{ ...CHART_OPTS.scales.y, ticks:{ ...CHART_OPTS.scales.y.ticks, stepSize:1 } } },
      plugins:{ ...CHART_OPTS.plugins, tooltip:{ ...CHART_OPTS.plugins.tooltip, callbacks:{ label: ctx => ' '+ctx.parsed.y+' session'+(ctx.parsed.y!==1?'s':'') } } } }
  });
}

// ═══════════════════════════════════════════════════════
// ACTIVE WORKOUT
// ═══════════════════════════════════════════════════════
let WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };

function startWorkout(day) {
  WK.day = day;
  WK.startTime = Date.now();
  WK.done = {};
  // Seed session entries with defaults if empty
  S.split[day].forEach(id => {
    if (!S.session[day][id]) S.session[day][id] = getDefaultEntry(id, day);
  });
  const LABEL = { push:'Push Day', pull:'Pull Day', legs:'Leg Day', arms:'Arms Day' };
  document.getElementById('wk-title').textContent = LABEL[day];
  document.getElementById('workout-overlay').style.display = 'flex';
  renderWorkoutCards();
  clearInterval(WK.timerInterval);
  WK.timerInterval = setInterval(tickTimer, 1000);
  // Make bank modal add to workout
  BM.targetDay = day;
}

function tickTimer() {
  if (WK.paused) return;
  const elapsed = WK.pausedElapsed + Math.floor((Date.now() - WK.startTime) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  const el = document.getElementById('wk-timer');
  if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function togglePauseWorkout() {
  if (WK.paused) {
    WK.paused = false;
    WK.startTime = Date.now();
    document.getElementById('wk-pause-icon')?.innerHTML && (document.getElementById('wk-pause-icon').innerHTML = svg(ICO.pause, 13));
    document.getElementById('wk-pause-label') && (document.getElementById('wk-pause-label').textContent = 'Pause');
    document.getElementById('wk-paused-label') && (document.getElementById('wk-paused-label').style.display = 'none');
  } else {
    WK.pausedElapsed += Math.floor((Date.now() - WK.startTime) / 1000);
    WK.paused = true;
    document.getElementById('wk-pause-icon') && (document.getElementById('wk-pause-icon').innerHTML = svg(ICO.play, 13));
    document.getElementById('wk-pause-label') && (document.getElementById('wk-pause-label').textContent = 'Resume');
    document.getElementById('wk-paused-label') && (document.getElementById('wk-paused-label').style.display = 'block');
  }
}

function cancelWorkout() {
  if (!confirm('Cancel this workout? Your exercise data will not be lost.')) return;
  clearInterval(WK.timerInterval);
  document.getElementById('workout-overlay').style.display = 'none';
  WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };
}

function renderWorkoutCards() {
  const day = WK.day;
  const last = getLastSession(day);
  const cards = S.split[day].map(id => workoutCardHTML(id, day, last)).join('');
  document.getElementById('wk-scroll').innerHTML =
    timerCardHTML() + (cards || '<div class="empty-state">No exercises — tap + Add</div>');
}

function timerCardHTML() {
  const doneCount = Object.values(WK.done).filter(Boolean).length;
  const total = S.split[WK.day]?.length || 0;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  const dayStreak = getCurrentStreak();
  return `
    <div class="wk-timer-card" id="wk-timer-card">
      <div>
        <div class="wk-timer-main" id="wk-timer">0:00</div>
        <div class="wk-timer-paused" id="wk-paused-label" style="display:none">Paused</div>
      </div>
      <div class="wk-insights">
        <div class="wk-insight-chip" id="wk-progress-chip">${doneCount}/${total} done · ${pct}%</div>
        <div class="wk-insight-chip">🔥 ${dayStreak} day streak</div>
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:6px" id="wk-pause-btn" onclick="togglePauseWorkout()">
          <span id="wk-pause-icon">${svg(ICO.pause, 13)}</span><span id="wk-pause-label">Pause</span>
        </button>
      </div>
    </div>`;
}

function shouldSuggestWeightUp(exId, excludeId) {
  // Only look at sessions still in history (respects deletions), exclude current session
  const hist = getExerciseHistory(exId).filter(h => h.id !== excludeId);
  if (hist.length < 3) return null;
  const recent = hist.slice(-3);
  const weights = recent.map(s => parseFloat(s.exercises[exId]?.[0]?.weight)||0);
  const reps    = recent.map(s => parseInt(s.exercises[exId]?.[0]?.reps)||0);
  const allSame = weights.every(w => w === weights[0]) && weights[0] > 0;
  const allGoodReps = reps.every(r => r >= 8);
  if (allSame && allGoodReps) return weights[0];
  return null;
}

function workoutCardHTML(exId, day, lastSession) {
  const ex = S.bank[exId]; if (!ex) return '';
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  const { weight, reps, sets } = S.session[day][exId];
  const isDone = !!WK.done[exId];

  const prevSets = lastSession?.exercises?.[exId] || [];
  const prevHTML = prevSets.length
    ? `<div class="wk-prev">Last: ${prevSets.length} × ${prevSets[0]?.weight}lb × ${prevSets[0]?.reps} reps · ${formatDateShort(lastSession.date)}</div>`
    : '';

  const suggestW = shouldSuggestWeightUp(exId);
  const suggestHTML = suggestW && !isDone
    ? `<div class="wk-suggest">⬆ Consider moving up from ${suggestW}lb — you've hit 3 sessions at ≥8 reps</div>`
    : '';

  const caliLink = ex.caliUrl
    ? `<a class="cali-link" href="${ex.caliUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${svg(ICO.ext,9)}</a>`
    : '';

  return `
    <div class="wk-card ${isDone?'done':''}" data-id="${exId}">
      <div class="wk-card-header">
        <button class="wk-done-btn ${isDone?'checked':''}" onclick="toggleWkDone('${exId}')" title="Mark complete">
          ${isDone ? svg(ICO.check, 11) : ''}
        </button>
        <div class="wk-card-name">${ex.name}${caliLink}</div>
        ${isDone ? '' : `<div class="card-actions">
          <button class="icon-btn swap"   onclick="openBankModal('${exId}','${day}')"  title="Swap">${svg(ICO.swap)}</button>
          <button class="icon-btn danger" onclick="removeFromWorkout('${exId}')" title="Remove">${svg(ICO.close)}</button>
        </div>`}
      </div>
      ${prevHTML}${suggestHTML}
      <div class="wk-card-body">
        <div class="set-control-row">
          <div class="set-field">
            <div class="set-field-label">Weight (lbs)</div>
            <input class="set-input" type="number" min="0" step="2.5" inputmode="decimal"
              placeholder="0" value="${weight}"
              onchange="updateEntry('${exId}','${day}','weight',this.value)">
          </div>
          <div class="set-field">
            <div class="set-field-label">Reps</div>
            <input class="set-input" type="number" min="1" step="1" inputmode="numeric"
              placeholder="0" value="${reps}"
              onchange="updateEntry('${exId}','${day}','reps',this.value)">
          </div>
          <div class="sets-counter">
            <div class="sets-counter-label">Sets</div>
            <div class="sets-counter-control">
              <button class="sets-counter-btn" onclick="wkChangeSetCount('${exId}','${day}',-1)">−</button>
              <div class="sets-counter-val" id="wk-sets-${exId}">${sets}</div>
              <button class="sets-counter-btn" onclick="wkChangeSetCount('${exId}','${day}',+1)">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleWkDone(exId) {
  WK.done[exId] = !WK.done[exId];
  // Re-render just this card so buttons appear/disappear correctly
  const card = document.querySelector(`#wk-scroll .wk-card[data-id="${exId}"]`);
  if (card) {
    const last = getLastSession(WK.day);
    card.outerHTML = workoutCardHTML(exId, WK.day, last);
  }
  // Update progress chip
  const doneCount = Object.values(WK.done).filter(Boolean).length;
  const total = S.split[WK.day]?.length || 0;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  const chip = document.getElementById('wk-progress-chip');
  if (chip) chip.textContent = `${doneCount}/${total} done · ${pct}%`;
}

function wkChangeSetCount(exId, day, delta) {
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  const current = parseInt(S.session[day][exId].sets)||1;
  const next = Math.max(1, Math.min(20, current + delta));
  S.session[day][exId].sets = next;
  save();
  const el = document.getElementById(`wk-sets-${exId}`);
  if (el) el.textContent = next;
}

function removeFromWorkout(exId) {
  const day = WK.day;
  S.split[day] = S.split[day].filter(id => id !== exId);
  delete S.session[day][exId];
  delete WK.done[exId];
  save();
  renderWorkoutCards();
}

function finishWorkout() {
  const day = WK.day;
  const elapsed = WK.pausedElapsed + (WK.paused ? 0 : Math.floor((Date.now() - WK.startTime) / 1000));
  clearInterval(WK.timerInterval);

  // Only log exercises that were marked done
  const doneIds = Object.keys(WK.done).filter(id => WK.done[id]);
  const logged = {};
  doneIds.forEach(exId => {
    const entry = S.session[day][exId];
    if (!entry || (entry.weight === '' && entry.reps === '')) return;
    const sets = [];
    const n = parseInt(entry.sets)||1;
    for (let i = 0; i < n; i++) sets.push({ weight: entry.weight, reps: entry.reps });
    logged[exId] = sets;
  });

  if (!Object.keys(logged).length) { showToast('Enter weight/reps before finishing','error'); clearInterval(WK.timerInterval); WK.timerInterval = setInterval(tickTimer,1000); return; }

  // Save to history
  S.history.push({ id: Date.now().toString(), day, date: today(), exercises: logged, duration: elapsed });
  const justLoggedId = S.history[S.history.length - 1].id;
  S.session[day] = {};
  save();

  // Hide workout overlay
  document.getElementById('workout-overlay').style.display = 'none';
  WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };

  // Show summary
  showWorkoutSummary(justLoggedId, elapsed);
  render();
}

let _summaryHistId = null;
let _summaryElapsed = 0;

function showWorkoutSummary(histId, elapsedSecs) {
  _summaryHistId = histId;
  _summaryElapsed = elapsedSecs;
  renderSummaryBody();
  document.getElementById('summary-overlay').classList.add('open');
}

function renderSummaryBody() {
  const histId = _summaryHistId;
  const elapsedSecs = _summaryElapsed;
  const session = S.history.find(h => h.id === histId);
  if (!session) return;

  const dur = elapsedSecs || session.duration || 0;
  const m = Math.floor(dur / 60), s = dur % 60;
  const durationStr = dur ? `${m}:${s.toString().padStart(2,'0')}` : '—';
  const exIds = Object.keys(session.exercises);
  const health = session.healthData || null;

  // Top stats
  const totalSets = exIds.reduce((acc, id) => acc + (session.exercises[id]?.length||0), 0);
  const totalReps = exIds.reduce((acc, id) => {
    const sets = session.exercises[id]||[];
    return acc + sets.reduce((a, sv) => a + (parseInt(sv.reps)||0), 0);
  }, 0);
  const prs = exIds.filter(id => {
    const w = parseFloat(session.exercises[id]?.[0]?.weight)||0;
    const allPrev = S.history.filter(h => h.id !== histId);
    const prevMax = allPrev.reduce((max, h) => {
      const pw = parseFloat(h.exercises[id]?.[0]?.weight)||0;
      return pw > max ? pw : max;
    }, 0);
    return w > 0 && w > prevMax;
  });

  const statsHTML = `
    <div class="summary-stat-row">
      <div class="summary-stat"><div class="summary-stat-val">${durationStr}</div><div class="summary-stat-lbl">Duration</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${exIds.length}</div><div class="summary-stat-lbl">Exercises</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${totalSets}</div><div class="summary-stat-lbl">Total Sets</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${totalReps}</div><div class="summary-stat-lbl">Total Reps</div></div>
    </div>`;

  // Apple Health card
  const heartSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--danger)" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const healthHTML = health ? `
    <div class="health-card">
      <div class="health-card-header">
        <div class="health-card-title">${heartSVG} Apple Watch</div>
        <div style="font-size:10px;color:var(--muted)">${health.startTime ? health.startTime : ''}</div>
      </div>
      <div class="health-stat-grid">
        <div class="health-stat">
          <div class="health-stat-val">${health.activeCalories ?? '—'}</div>
          <div class="health-stat-lbl">Active Cal</div>
        </div>
        <div class="health-stat">
          <div class="health-stat-val">${health.totalCalories ?? '—'}</div>
          <div class="health-stat-lbl">Total Cal</div>
        </div>
        <div class="health-stat">
          <div class="health-stat-val">${health.avgHeartRate ?? '—'}</div>
          <div class="health-stat-lbl">Avg HR</div>
        </div>
        <div class="health-stat">
          <div class="health-stat-val">${health.peakHeartRate ?? '—'}</div>
          <div class="health-stat-lbl">Peak HR</div>
        </div>
        ${health.hrv != null ? `<div class="health-stat">
          <div class="health-stat-val">${health.hrv}</div>
          <div class="health-stat-lbl">HRV (ms)</div>
        </div>` : ''}
        ${health.activeCalories && health.totalCalories ? `<div class="health-stat">
          <div class="health-stat-val">${health.totalCalories - health.activeCalories}</div>
          <div class="health-stat-lbl">Resting Cal</div>
        </div>` : ''}
      </div>
    </div>` : `
    <button class="health-import-btn" onclick="importHealthData('${histId}')">
      ${heartSVG} Import Apple Watch Data
    </button>`;

  // HR timeline chart (shown separately below health card, when data exists)
  const hrChartHTML = (health?.hrTimeline?.length > 1) ? `
    <div class="health-card" style="margin-bottom:16px">
      <div class="health-card-header" style="margin-bottom:8px">
        <div class="health-card-title">${heartSVG} Heart Rate Timeline</div>
      </div>
      <canvas id="hr-chart-${histId}" height="90"></canvas>
    </div>
    <script>
      (function() {
        const canvas = document.getElementById('hr-chart-${histId}');
        if (!canvas) return;
        const data = ${JSON.stringify(health.hrTimeline)};
        const mins = ${JSON.stringify(health.workoutMinutes || 0)};
        new Chart(canvas.getContext('2d'), {
          type: 'line',
          data: {
            labels: data.map((_, i) => mins ? Math.round(i * mins / (data.length-1)) + 'm' : i),
            datasets: [{ data, borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.12)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }]
          },
          options: { responsive: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + ' bpm' } } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563', maxTicksLimit: 8 } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563' } } } }
        });
      })();
    <\/script>` : '';

  // Per-exercise breakdown
  const exRows = exIds.map(exId => {
    const ex = S.bank[exId];
    const sets = session.exercises[exId]||[];
    const w = parseFloat(sets[0]?.weight)||0;
    const r = parseInt(sets[0]?.reps)||0;
    const n = sets.length;
    const e1rm = calc1RM(w, r);
    const isPR = prs.includes(exId);

    const prevSessions = getExerciseHistory(exId).filter(h => h.id !== histId);
    const prevBest = prevSessions.length ? parseFloat(prevSessions[prevSessions.length-1].exercises[exId]?.[0]?.weight)||0 : 0;
    const delta = w && prevBest ? w - prevBest : 0;

    const suggestW = shouldSuggestWeightUp(exId, histId);
    const suggestHTML = suggestW
      ? `<div class="summary-ex-insight">⬆ Consider moving up from ${suggestW}lb next session</div>`
      : '';

    const badges = [
      isPR ? '<span class="pr-badge">PR</span>' : '',
      delta > 0 ? `<span class="up-badge">+${delta}lb</span>` : '',
    ].filter(Boolean).join(' ');

    return `
      <div class="summary-ex-row">
        <div class="summary-ex-name">${ex?.name||exId} ${badges}</div>
        <div class="summary-ex-stats">${n} sets × ${w}lb × ${r} reps${e1rm ? ' · E1RM: '+e1rm+'lb' : ''}</div>
        ${suggestHTML}
      </div>`;
  }).join('');

  document.getElementById('summary-body').innerHTML = `
    ${statsHTML}
    ${healthHTML}
    ${hrChartHTML}
    <div class="summary-section" style="margin-top:20px">
      <div class="summary-section-title">Exercise Breakdown</div>
      ${exRows}
    </div>`;
}

function importHealthData(histId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,.txt';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        // Flatten — accept nested or flat
        const h = data.healthData || data;

        // Case-insensitive key lookup so Shortcuts key naming doesn't matter
        const flat = {};
        Object.keys(h).forEach(k => { flat[k.toLowerCase().replace(/[_\s]/g,'')] = h[k]; });

        const pick = (...keys) => {
          for (const k of keys) { const v = flat[k.toLowerCase().replace(/[_\s]/g,'')]; if (v != null && v !== '') return v; }
          return null;
        };

        const activeCal  = pick('activecalories','activeenergy','activeenergyburned');
        const totalCal   = pick('totalcalories','totalenergy','totalenergyburned');
        const avgHR      = pick('avgheartrate','averageheartrate','heartrateaverage','averagehr');
        const peakHR     = pick('peakheartrate','maxheartrate','maximumheartrate','peakhr','maximumhr','maxhr');
        const startTime  = pick('starttime','startdate','start');

        // Use != null so 0 values still pass
        if (activeCal == null && avgHR == null) {
          const keys = Object.keys(h).join(', ');
          showToast(`Keys found: ${keys || 'none'} — check format`, 'error');
          return;
        }

        const session = S.history.find(s => s.id === histId);
        if (!session) return;
        const hrv        = pick('hrv','heartratevariability','heartratevariabilitysdnn','hrvsdnn');
        const workoutMins = pick('workoutminutes','durationminutes','duration');
        // hrTimeline: accept array of numbers
        const rawTimeline = h.hrTimeline || h.hr_timeline || h.heartRateTimeline || h.heartrate_timeline || null;
        const hrTimeline = Array.isArray(rawTimeline) ? rawTimeline.map(Number).filter(n => !isNaN(n)) : null;

        session.healthData = {
          activeCalories: activeCal   != null ? Math.round(activeCal)   : null,
          totalCalories:  totalCal    != null ? Math.round(totalCal)    : null,
          avgHeartRate:   avgHR       != null ? Math.round(avgHR)       : null,
          peakHeartRate:  peakHR      != null ? Math.round(peakHR)      : null,
          hrv:            hrv         != null ? Math.round(hrv)         : null,
          workoutMinutes: workoutMins  != null ? Math.round(workoutMins) : null,
          hrTimeline:     hrTimeline  || null,
          startTime:      startTime   ? String(startTime) : null,
        };
        save();
        renderSummaryBody();
        showToast('Apple Watch data imported', 'success');
      } catch(err) { showToast('Could not parse file: ' + err.message, 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function viewSessionSummary(histId) {
  _summaryHistId = histId;
  _summaryElapsed = 0;
  renderSummaryBody();
  document.getElementById('summary-overlay').classList.add('open');
}

function closeSummary() {
  document.getElementById('summary-overlay').classList.remove('open');
}

// Re-render workout cards when bank modal adds/swaps an exercise during an active workout
const _origSelectExercise = selectExercise;
function selectExercise(exId) {
  _origSelectExercise(exId);
  if (WK.day) renderWorkoutCards();
}

// ── Toast ──────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-US',{ weekday:'long', month:'long', day:'numeric' });

// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('liftlog_theme', next);
  applyTheme(next);
}

// Load saved theme before render to avoid flash
applyTheme(localStorage.getItem('liftlog_theme') || 'dark');

loadState();
render();
</script>
</body>
</html>
