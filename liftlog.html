// Scoped touchend delegate for #wk-scroll.
// iOS Safari doesn't reliably fire click on buttons inside overflow:auto
// within position:fixed. We invoke btn.onclick directly (not btn.click())
// so there's no synthetic click event — prevents the double-fire that
// btn.click() causes when iOS also dispatches the ghost click.
function attachWkTouchDelegate(scroll) {
  let _didScroll = false;
  scroll.addEventListener('scroll', () => { _didScroll = true; }, { passive: true });
  scroll.addEventListener('touchstart', () => { _didScroll = false; }, { passive: true });
  scroll.addEventListener('touchend', function(e) {
    if (_didScroll) return;
    const btn = e.target.closest('button');
    if (!btn || btn.disabled || btn.closest('.drag-handle')) return;
    if (typeof btn.onclick === 'function') {
      e.preventDefault(); // suppress the ghost click so onclick doesn't fire twice
      btn.onclick.call(btn, e);
    }
  }, { passive: false });
}

function timerCardHTML() {
  const doneCount = Object.values(WK.done).filter(Boolean).length;
  const total = S.split[WK.day]?.length || 0;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  const dayStreak = getCurrentStreak();
  return `
    <div class="wk-timer-card" id="wk-timer-card">
      <div>
        <div class="wk-timer-main" id="wk-timer">0:00</div>
        <div class="wk-timer-paused" id="wk-paused-label" style="display:none">Paused</div>
      </div>
      <div class="wk-insights">
        <div class="wk-insight-chip" id="wk-progress-chip">${doneCount}/${total} done · ${pct}%</div>
        <div class="wk-insight-chip">🔥 ${dayStreak} day streak</div>
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:6px" id="wk-pause-btn" onclick="togglePauseWorkout()">
          <span id="wk-pause-icon">${svg(ICO.pause, 13)}</span><span id="wk-pause-label">Pause</span>
        </button>
      </div>
    </div>`;
}

function shouldSuggestWeightUp(exId, excludeId) {
  // Only look at sessions still in history (respects deletions), exclude current session
  const hist = getExerciseHistory(exId).filter(h => h.id !== excludeId);
  // Manual flag: suggest based on last logged weight
  if (S.flaggedForIncrease?.[exId]) {
    const lastW = hist.length ? parseFloat(hist[hist.length-1].exercises[exId]?.[0]?.weight)||0 : 0;
    if (lastW > 0) return lastW;
  }
  if (hist.length < 3) return null;
  const recent = hist.slice(-3);
  const weights = recent.map(s => parseFloat(s.exercises[exId]?.[0]?.weight)||0);
  const reps    = recent.map(s => parseInt(s.exercises[exId]?.[0]?.reps)||0);
  const allSame = weights.every(w => w === weights[0]) && weights[0] > 0;
  const allGoodReps = reps.every(r => r >= 8);
  if (allSame && allGoodReps) return weights[0];
  return null;
}

function workoutCardHTML(exId, day, lastSession) {
  const ex = S.bank[exId]; if (!ex) return '';
  if (!S.session[day][exId]) S.session[day][exId] = getDefaultEntry(exId, day);
  S.session[day][exId] = migrateEntry(S.session[day][exId]);
  const sessionSets = S.session[day][exId];
  const isDone = !!WK.done[exId];

  const prevSets = lastSession?.exercises?.[exId] || [];
  const prevHTML = prevSets.length
    ? `<div class="wk-prev">Last: ${prevSets.length} × ${prevSets[0]?.weight}lb × ${prevSets[0]?.reps} reps · ${formatDateShort(lastSession.date)}</div>`
    : '';

  const suggestW = shouldSuggestWeightUp(exId);
  const isFlagged = !!S.flaggedForIncrease?.[exId];
  const suggestHTML = suggestW && !isDone
    ? `<div class="wk-suggest">${svg(ICO.arrowUp,11)} ${isFlagged ? 'Flagged for weight increase next session' : `Consider moving up from ${suggestW}lb — you've hit 3 sessions at ≥8 reps`}</div>`
    : '';

  const caliLink = ex.caliUrl
    ? `<a class="cali-link" href="${ex.caliUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${svg(ICO.ext,9)}</a>`
    : '';

  const isDescOpen = !!openDescs[exId + 'wk'];
  const descHTML = ex.desc
    ? `<div class="card-desc ${isDescOpen?'open':''}" id="desc-${exId}-wk">${ex.desc}${ex.caliUrl ? `<br><a class="desc-src" href="${ex.caliUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View on Calistree ↗</a>` : ''}</div>`
    : '';

  return `
    <div class="wk-card ${isDone?'done':''}" data-id="${exId}">
      <div class="wk-card-header">
        <button class="wk-done-btn ${isDone?'checked':''}" onclick="toggleWkDone('${exId}')" title="Mark complete">
          ${isDone ? svg(ICO.check, 11) : ''}
        </button>
        <div class="wk-card-name">${ex.name}${caliLink}</div>
        ${isDone ? '' : `<div class="card-actions">
          ${ex.desc ? `<button class="icon-btn ${isDescOpen?'is-active':''}" onclick="toggleWkDesc('${exId}')" title="About">${svg(ICO.info)}</button>` : ''}
          <button class="icon-btn" onclick="toggleFlagIncrease('${exId}')" title="${isFlagged ? 'Remove flag' : 'Flag for weight increase next session'}" style="${isFlagged ? 'color:var(--orange);border-color:var(--orange)' : ''}">${svg(ICO.arrowUp)}</button>
          <button class="icon-btn swap"   onclick="openBankModal('${exId}','${day}')"  title="Swap">${svg(ICO.swap)}</button>
          <button class="icon-btn danger" onclick="removeFromWorkout('${exId}')" title="Remove">${svg(ICO.close)}</button>
        </div>`}
      </div>
      ${descHTML}
      ${prevHTML}${suggestHTML}
      <div class="wk-card-body">${isDone ? '' : cardBodyHTML(sessionSets, exId, day)}</div>
    </div>`;
}

function toggleWkDone(exId) {
  WK.done[exId] = !WK.done[exId];
  saveWK();
  // Re-render just this card so buttons appear/disappear correctly
  const card = document.querySelector(`#wk-scroll .wk-card[data-id="${exId}"]`);
  if (card) {
    const last = getLastSession(WK.day);
    card.outerHTML = workoutCardHTML(exId, WK.day, last);
  }
  // Update progress chip
  const doneCount = Object.values(WK.done).filter(Boolean).length;
  const total = S.split[WK.day]?.length || 0;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  const chip = document.getElementById('wk-progress-chip');
  if (chip) chip.textContent = `${doneCount}/${total} done · ${pct}%`;
}


function removeFromWorkout(exId) {
  const day = WK.day;
  S.split[day] = S.split[day].filter(id => id !== exId);
  delete S.session[day][exId];
  delete WK.done[exId];
  save();
  renderWorkoutCards();
}

function _setFlag(exId) {
  if (!S.flaggedForIncrease) S.flaggedForIncrease = {};
  S.flaggedForIncrease[exId] = !S.flaggedForIncrease[exId];
  if (!S.flaggedForIncrease[exId]) delete S.flaggedForIncrease[exId];
  save();
  return !!S.flaggedForIncrease?.[exId];
}

function toggleFlagIncrease(exId) {
  const flagged = _setFlag(exId);
  const last = getLastSession(WK.day);
  const card = document.querySelector(`#wk-scroll .wk-card[data-id="${exId}"]`);
  if (card) card.outerHTML = workoutCardHTML(exId, WK.day, last);
  const homeCard = document.querySelector(`.exercise-card[data-id="${exId}"]`);
  if (homeCard) homeCard.outerHTML = cardHTML(exId, WK.day, last);
  showToast(flagged ? 'Flagged for increase next session' : 'Flag removed', 'success');
}

function toggleFlagIncreaseHome(exId, day) {
  const flagged = _setFlag(exId);
  const last = getLastSession(day);
  const card = document.querySelector(`.exercise-card[data-id="${exId}"]`);
  if (card) card.outerHTML = cardHTML(exId, day, last);
  showToast(flagged ? 'Flagged for increase next session' : 'Flag removed', 'success');
}

function toggleFlagIncreaseSession(exId, sessionId) {
  const flagged = _setFlag(exId);
  const session = S.history.find(h => h.id === sessionId);
  if (session) setSessionView(sessionId, true);
  showToast(flagged ? 'Flagged for increase next session' : 'Flag removed', 'success');
}

function finishWorkout() {
  const day = WK.day;
  const elapsed = WK.pausedElapsed + (WK.paused ? 0 : Math.floor((Date.now() - WK.startTime) / 1000));
  clearInterval(WK.timerInterval);

  // Only log exercises that were marked done
  const doneIds = Object.keys(WK.done).filter(id => WK.done[id]);
  const logged = {};
  doneIds.forEach(exId => {
    const entry = migrateEntry(S.session[day][exId] || []);
    const valid = entry.filter(s => s.weight !== '' || s.reps !== '');
    if (!valid.length) return;
    logged[exId] = valid;
  });

  if (!Object.keys(logged).length) { showToast('Enter weight/reps before finishing','error'); clearInterval(WK.timerInterval); WK.timerInterval = setInterval(tickTimer,1000); return; }

  // Clear manual increase flags for exercises where the user logged a heavier weight
  if (S.flaggedForIncrease) {
    const prevSessions = S.history;
    Object.keys(logged).forEach(exId => {
      if (!S.flaggedForIncrease[exId]) return;
      const prev = prevSessions.filter(h => h.exercises[exId]).slice(-1)[0];
      const prevW = prev ? parseFloat(prev.exercises[exId]?.[0]?.weight)||0 : 0;
      const newW  = parseFloat(logged[exId]?.[0]?.weight)||0;
      if (newW > prevW) delete S.flaggedForIncrease[exId];
    });
  }

  // Save to history
  S.history.push({ id: Date.now().toString(), day, date: today(), exercises: logged, duration: elapsed });
  const justLoggedId = S.history[S.history.length - 1].id;
  S.session[day] = {};
  save();
  clearWK();

  // Hide workout overlay and banner
  document.getElementById('workout-overlay').style.display = 'none';
  document.getElementById('wk-banner').style.display = 'none';
  WK = { day: null, startTime: null, timerInterval: null, done: {}, paused: false, pausedElapsed: 0 };

  // Show summary
  showWorkoutSummary(justLoggedId, elapsed);
  render();
}

let _summaryHistId = null;
let _summaryElapsed = 0;

function showWorkoutSummary(histId, elapsedSecs) {
  _summaryHistId = histId;
  _summaryElapsed = elapsedSecs;
  renderSummaryBody();
  document.getElementById('summary-overlay').classList.add('open');
}

function renderSummaryBody() {
  const histId = _summaryHistId;
  const elapsedSecs = _summaryElapsed;
  const session = S.history.find(h => h.id === histId);
  if (!session) return;

  const dur = elapsedSecs || session.duration || 0;
  const m = Math.floor(dur / 60), s = dur % 60;
  const durationStr = dur ? `${m}:${s.toString().padStart(2,'0')}` : '—';
  const exIds = Object.keys(session.exercises);
  const health = session.healthData || null;

  // Top stats
  const totalSets = exIds.reduce((acc, id) => acc + (session.exercises[id]?.length||0), 0);
  const totalReps = exIds.reduce((acc, id) => {
    const sets = session.exercises[id]||[];
    return acc + sets.reduce((a, sv) => a + (parseInt(sv.reps)||0), 0);
  }, 0);
  const prs = exIds.filter(id => {
    const w = Math.max(...(session.exercises[id]||[]).map(s => parseFloat(s.weight)||0));
    return isFirstPR(id, histId, w);
  });

  const statsHTML = `
    <div class="summary-stat-row">
      <div class="summary-stat"><div class="summary-stat-val">${durationStr}</div><div class="summary-stat-lbl">Duration</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${exIds.length}</div><div class="summary-stat-lbl">Exercises</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${totalSets}</div><div class="summary-stat-lbl">Total Sets</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${totalReps}</div><div class="summary-stat-lbl">Total Reps</div></div>
    </div>`;

  // Apple Health card
  const heartSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--danger)" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const healthHTML = health ? `
    <div class="health-card">
      <div class="health-card-header">
        <div class="health-card-title">${heartSVG} Apple Watch</div>
        <div style="font-size:10px;color:var(--muted)">${health.startTime ? health.startTime : ''}</div>
      </div>
      <div class="health-stat-grid">
        <div class="health-stat">
          <div class="health-stat-val">${health.activeCalories ?? '—'}</div>
          <div class="health-stat-lbl">Active Cal</div>
        </div>
        <div class="health-stat">
          <div class="health-stat-val">${health.avgHeartRate ?? '—'}</div>
          <div class="health-stat-lbl">Avg HR</div>
        </div>
        <div class="health-stat">
          <div class="health-stat-val">${health.peakHeartRate ?? '—'}</div>
          <div class="health-stat-lbl">Peak HR</div>
        </div>
        ${health.intensity != null ? `<div class="health-stat">
          <div class="health-stat-val">${health.intensity}</div>
          <div class="health-stat-lbl">Intensity</div>
        </div>` : ''}
        ${health.hrv != null ? `<div class="health-stat">
          <div class="health-stat-val">${health.hrv}</div>
          <div class="health-stat-lbl">HRV (ms)</div>
        </div>` : ''}
      </div>
    </div>` : `
    <button class="health-import-btn" onclick="importHealthData('${histId}')">
      ${heartSVG} Import Apple Watch Data
    </button>`;

  // HR timeline chart (shown separately below health card, when data exists)
  const hrChartHTML = (health?.hrTimeline?.length > 1) ? `
    <div class="health-card" style="margin-bottom:16px">
      <div class="health-card-header" style="margin-bottom:8px">
        <div class="health-card-title">${heartSVG} Heart Rate Timeline</div>
      </div>
      <canvas id="hr-chart-${histId}" height="90"></canvas>
    </div>` : '';

  // Per-exercise breakdown
  const exRows = exIds.map(exId => {
    const ex = S.bank[exId];
    const sets = session.exercises[exId]||[];
    const w = parseFloat(sets[0]?.weight)||0;
    const r = parseInt(sets[0]?.reps)||0;
    const n = sets.length;
    const e1rm = calc1RM(w, r);
    const isPR = prs.includes(exId);

    const prevSessions = getExerciseHistory(exId).filter(h => h.id !== histId);
    const prevBest = prevSessions.length ? parseFloat(prevSessions[prevSessions.length-1].exercises[exId]?.[0]?.weight)||0 : 0;
    const delta = w && prevBest ? w - prevBest : 0;

    const suggestW = shouldSuggestWeightUp(exId, histId);
    const suggestHTML = suggestW
      ? `<div class="summary-ex-insight">⬆ Consider moving up from ${suggestW}lb next session</div>`
      : '';

    const badges = [
      isPR ? '<span class="pr-badge">PR</span>' : '',
      delta > 0 ? `<span class="up-badge">+${delta}lb</span>` : '',
    ].filter(Boolean).join(' ');

    return `
      <div class="summary-ex-row">
        <div class="summary-ex-name">${ex?.name||exId} ${badges}</div>
        <div class="summary-ex-stats">${n} sets × ${w}lb × ${r} reps${e1rm ? ' · E1RM: '+e1rm+'lb' : ''}</div>
        ${suggestHTML}
      </div>`;
  }).join('');

  document.getElementById('summary-body').innerHTML = `
    ${statsHTML}
    ${healthHTML}
    ${hrChartHTML}
    <div class="summary-section" style="margin-top:20px">
      <div class="summary-section-title">Exercise Breakdown</div>
      ${exRows}
    </div>`;

  // Init HR chart after innerHTML (scripts inside innerHTML don't execute)
  if (health?.hrTimeline?.length > 1) {
    const canvas = document.getElementById(`hr-chart-${histId}`);
    if (canvas) {
      const hrData = health.hrTimeline;
      const hrLabels = health.hrTimelineLabels?.length
        ? health.hrTimelineLabels
        : hrData.map((_, i) => {
            const m = health.workoutMinutes || 0;
            return m ? Math.round(i * m / (hrData.length - 1)) + 'm' : String(i);
          });
      const avgHR  = health.avgHeartRate  ?? null;
      const peakHR = health.peakHeartRate ?? null;
      const refLinePlugin = {
        id: 'refLines',
        afterDatasetsDraw(chart) {
          const { ctx, scales: { y, x } } = chart;
          const lines = [
            avgHR  != null ? { val: avgHR,  color: 'rgba(248,113,113,0.45)', label: `Avg ${Math.round(avgHR)}` }  : null,
            peakHR != null ? { val: peakHR, color: 'rgba(248,113,113,0.25)', label: `Max ${Math.round(peakHR)}` } : null,
          ].filter(Boolean);
          lines.forEach(({ val, color, label }) => {
            const yPx = y.getPixelForValue(val);
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(x.left, yPx);
            ctx.lineTo(x.right, yPx);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = color;
            ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(label, x.right - 2, yPx - 3);
            ctx.restore();
          });
        }
      };
      new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels: hrLabels,
          datasets: [{ data: hrData, borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.12)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + ' bpm' } } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563', maxTicksLimit: 8 } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563' } }
          }
        },
        plugins: [refLinePlugin]
      });
    }
  }
}

function importHealthData(histId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,.txt';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);

        // ── Health Auto Export format ──
        // { data: { workouts: [{ activeEnergyBurned, heartRate, heartRateData, duration, start, avgHeartRate, maxHeartRate }],
        //           metrics: [{ name, data: [{ qty }] }] } }
        let activeCal, totalCal, avgHR, peakHR, startTime, durationSecs, hrv, intensity, hrTimeline = null, hrTimelineLabels = null;

        // Detect Health Auto Export: data.data.workouts
        const haeData = data.data || data;
        if (haeData.workouts && Array.isArray(haeData.workouts) && haeData.workouts.length > 0) {
          // Safari can't parse "2026-04-09 07:01:44 -0400" — convert to ISO 8601
          const parseHAEDate = str => {
            if (!str) return new Date(0);
            // "YYYY-MM-DD HH:MM:SS ±HHMM" → "YYYY-MM-DDTHH:MM:SS±HH:MM"
            const iso = str.replace(' ', 'T').replace(' ', '').replace(/([+-])(\d{2})(\d{2})$/, '$1$2:$3');
            return new Date(iso);
          };

          // Filter to strength training workouts only, pick the most recent by start time
          const strength = haeData.workouts.filter(w => w.name === 'Traditional Strength Training');
          const pool = strength.length ? strength : haeData.workouts;
          const w = pool.reduce((best, cur) =>
            parseHAEDate(cur.start) > parseHAEDate(best.start) ? cur : best
          );

          activeCal    = w.activeEnergyBurned?.qty ?? null;
          avgHR        = w.heartRate?.avg?.qty ?? w.avgHeartRate?.qty ?? null;
          peakHR       = w.heartRate?.max?.qty ?? w.maxHeartRate?.qty ?? null;
          startTime    = w.start ?? null;
          durationSecs = w.duration ?? null;
          intensity    = w.intensity?.qty ?? null;
          // totalCal omitted: HAE metrics only provide daily basal (~1400 kcal), not workout-scoped basal

          // HRV from daily metrics
          const metrics = haeData.metrics || [];
          const hrvMetric = metrics.find(m => m.name === 'heart_rate_variability');
          hrv = hrvMetric?.data?.[0]?.qty ?? null;

          // Per-minute HR timeline from heartRateData[]
          if (Array.isArray(w.heartRateData) && w.heartRateData.length > 1) {
            // Sort by date ascending using Safari-safe parser
            const sorted = [...w.heartRateData].sort((a, b) => parseHAEDate(a.date) - parseHAEDate(b.date));
            const t0 = parseHAEDate(sorted[0].date).getTime();
            hrTimeline = sorted.map(d => Math.round(d.Avg));
            hrTimelineLabels = sorted.map(d => {
              const mins = Math.round((parseHAEDate(d.date).getTime() - t0) / 60000);
              return mins + 'm';
            });
          }

        } else {
          // Legacy Health Exporter (HKQuantityTypeIdentifier* keys)
          const workouts = data.workouts || [];
          if (workouts.length > 0) {
            const w = workouts[workouts.length - 1];
            const stats = w.statistics || {};
            const hrStats  = stats['HKQuantityTypeIdentifierHeartRate'] || {};
            const actCal   = stats['HKQuantityTypeIdentifierActiveEnergyBurned'] || {};
            const basCal   = stats['HKQuantityTypeIdentifierBasalEnergyBurned'] || {};
            const hrvStats = stats['HKQuantityTypeIdentifierHeartRateVariabilitySDNN'] || {};
            activeCal    = actCal.sum   ?? null;
            totalCal     = (actCal.sum != null && basCal.sum != null) ? actCal.sum + basCal.sum : null;
            avgHR        = hrStats.average ?? null;
            peakHR       = hrStats.max     ?? null;
            hrv          = hrvStats.average ?? null;
            startTime    = w.startDate    ?? null;
            durationSecs = w.duration     ?? null;
          }
        }

        if (activeCal == null && avgHR == null) {
          showToast('Could not read workout data from this file', 'error');
          return;
        }

        const session = S.history.find(s => s.id === histId);
        if (!session) return;

        const nonZero = v => (v != null && Number(v) > 0) ? Math.round(v) : null;
        const workoutMins = durationSecs != null ? Math.round(durationSecs / 60) : null;

        session.healthData = {
          activeCalories:    nonZero(activeCal),
          totalCalories:     nonZero(totalCal),
          avgHeartRate:      nonZero(avgHR),
          peakHeartRate:     nonZero(peakHR),
          hrv:               hrv != null ? Math.round(hrv * 10) / 10 : null,
          intensity:         intensity != null ? Math.round(intensity * 10) / 10 : null,
          workoutMinutes:    workoutMins,
          hrTimeline:        hrTimeline?.length > 1 ? hrTimeline : null,
          hrTimelineLabels:  hrTimelineLabels?.length > 1 ? hrTimelineLabels : null,
          startTime:         startTime ? String(startTime) : null,
        };
        save();
        renderSummaryBody();
        const summary = [
          nonZero(activeCal) ? `${Math.round(activeCal)} cal` : null,
          nonZero(avgHR)     ? `avg HR ${Math.round(avgHR)}` : null,
          nonZero(peakHR)    ? `peak ${Math.round(peakHR)}` : null,
          workoutMins        ? `${workoutMins} min` : null,
        ].filter(Boolean).join(' · ');
        showToast(`Imported: ${summary || 'data saved'}`, 'success');
      } catch(err) { showToast('Could not parse file: ' + err.message, 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function viewSessionSummary(histId) {
  _summaryHistId = histId;
  _summaryElapsed = 0;
  renderSummaryBody();
  document.getElementById('summary-overlay').classList.add('open');
}

function closeSummary() {
  document.getElementById('summary-overlay').classList.remove('open');
}

function shareWorkoutCard() {
  const histId = _summaryHistId;
  const session = S.history.find(h => h.id === histId);
  if (!session) return;

  const dur = _summaryElapsed || session.duration || 0;
  const m = Math.floor(dur / 60), s = dur % 60;
  const durationStr = dur ? `${m}:${s.toString().padStart(2,'0')}` : null;
  const health = session.healthData || null;
  const exIds = Object.keys(session.exercises);
  const totalSets = exIds.reduce((acc, id) => acc + (session.exercises[id]?.length||0), 0);
  const totalReps = exIds.reduce((acc, id) => {
    return acc + (session.exercises[id]||[]).reduce((a, sv) => a + (parseInt(sv.reps)||0), 0);
  }, 0);
  const prs = exIds.filter(id => {
    const w = Math.max(...(session.exercises[id]||[]).map(sv => parseFloat(sv.weight)||0));
    return isFirstPR(id, histId, w);
  });

  const DAY_LABEL = { push:'Push Day', pull:'Pull Day', legs:'Leg Day', arms:'Arms Day' };
  const dayLabel = DAY_LABEL[session.day] || session.day;
  const dateStr = session.date
    ? new Date(session.date + 'T12:00:00').toLocaleDateString('en-US',{ weekday:'long', month:'long', day:'numeric' })
    : '';

  const W = 640;
  const PADDING = 36;
  const COL = W - PADDING * 2;
  const GAP = 12;
  const PILL_H = 80;
  const HR_CHART_H = 80;

  const hasHRChart = !!(health?.hrTimeline?.length > 1);

  const stats = [
    durationStr ? { val: durationStr, lbl: 'Duration' } : null,
    { val: exIds.length, lbl: 'Exercises' },
    { val: totalSets,    lbl: 'Sets'       },
    { val: totalReps,    lbl: 'Reps'       },
    prs.length ? { val: prs.length, lbl: prs.length === 1 ? 'PR' : 'PRs' } : null,
  ].filter(Boolean);

  const hRow = health ? [
    health.activeCalories != null ? { val: health.activeCalories, lbl: 'Active Cal'  } : null,
    health.avgHeartRate   != null ? { val: health.avgHeartRate,   lbl: 'Avg HR'      } : null,
    health.peakHeartRate  != null ? { val: health.peakHeartRate,  lbl: 'Peak HR'     } : null,
    health.intensity      != null ? { val: health.intensity,      lbl: 'Intensity'   } : null,
    health.hrv            != null ? { val: health.hrv,            lbl: 'HRV (ms)'    } : null,
  ].filter(Boolean) : [];

  const hRowCount = hRow.length ? 1 : 0;

  const H = 44            // top padding
    + 32                  // LIFTLOG label
    + 40                  // day title
    + 20                  // date
    + 28                  // gap before stat pills
    + PILL_H              // stat pills
    + (hRowCount ? 32 + PILL_H + GAP : 0)                 // health label + row
    + (hasHRChart ? 36 + HR_CHART_H + GAP : 0)           // HR timeline chart
    + 44;                 // footer

  const canvas = document.createElement('canvas');
  const DPR = 2;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#111827');
  grad.addColorStop(1, '#0d1117');
  rr(0, 0, W, H, 24); ctx.fillStyle = grad; ctx.fill();

  // Top accent bar
  rr(0, 0, W, 4, 0); ctx.fillStyle = '#818cf8'; ctx.fill();

  // Header
  let y = 44;
  ctx.fillStyle = '#818cf8';
  ctx.font = `700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
  ctx.fillText('LIFTLOG', PADDING, y);

  y += 32;
  ctx.fillStyle = '#f9fafb';
  ctx.font = `700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
  ctx.fillText(dayLabel, PADDING, y);

  y += 20;
  ctx.fillStyle = '#6b7280';
  ctx.font = `400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
  ctx.fillText(dateStr, PADDING, y);

  // Stat pills
  y += 28;
  const pillW = Math.floor((COL - (stats.length - 1) * GAP) / stats.length);
  stats.forEach((st, i) => {
    const px = PADDING + i * (pillW + GAP);
    rr(px, y, pillW, PILL_H, 12); ctx.fillStyle = '#1f2937'; ctx.fill();
    rr(px, y, pillW, PILL_H, 12); ctx.strokeStyle = '#374151'; ctx.lineWidth = 1; ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = '#818cf8';
    ctx.font = `700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    ctx.fillText(String(st.val), px + pillW / 2, y + 36);

    ctx.fillStyle = '#6b7280';
    ctx.font = `500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    ctx.fillText(st.lbl.toUpperCase(), px + pillW / 2, y + 58);
    ctx.textAlign = 'left';
  });

  y += PILL_H;

  // Health pills
  if (hRowCount) {
    y += 24;
    ctx.fillStyle = '#4b5563';
    ctx.font = `600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    ctx.fillText('APPLE WATCH', PADDING, y);
    y += 12;

    function drawHRow(row) {
      const n = row.length;
      const pw = Math.floor((COL - (n - 1) * GAP) / n);
      row.forEach((st, i) => {
        const px = PADDING + i * (pw + GAP);
        rr(px, y, pw, PILL_H, 12); ctx.fillStyle = 'rgba(248,113,113,0.08)'; ctx.fill();
        rr(px, y, pw, PILL_H, 12); ctx.strokeStyle = 'rgba(248,113,113,0.2)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f87171';
        ctx.font = `700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.fillText(String(st.val), px + pw / 2, y + 36);
        ctx.fillStyle = '#6b7280';
        ctx.font = `500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.fillText(st.lbl.toUpperCase(), px + pw / 2, y + 58);
        ctx.textAlign = 'left';
      });
      y += PILL_H + GAP;
    }

    if (hRow.length) drawHRow(hRow);
  }

  // HR timeline chart
  if (hasHRChart) {
    const hrData = health.hrTimeline;
    y += 24;
    ctx.fillStyle = '#4b5563';
    ctx.font = `600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    ctx.fillText('HEART RATE TIMELINE', PADDING, y);
    y += 12;

    const CP = 8; // chart inner padding
    const minHR = Math.min(...hrData), maxHR = Math.max(...hrData);
    const hrRange = maxHR - minHR || 1;
    const cLeft = PADDING + CP, cRight = PADDING + COL - CP;
    const cTop = y + CP, cBot = y + HR_CHART_H - CP;
    const cW = cRight - cLeft, cH = cBot - cTop;

    // Card background
    rr(PADDING, y, COL, HR_CHART_H, 12);
    ctx.fillStyle = 'rgba(248,113,113,0.06)'; ctx.fill();
    rr(PADDING, y, COL, HR_CHART_H, 12);
    ctx.strokeStyle = 'rgba(248,113,113,0.15)'; ctx.lineWidth = 1; ctx.stroke();

    // Map points
    const pts = hrData.map((v, i) => ({
      x: cLeft + (i / (hrData.length - 1)) * cW,
      y: cBot - ((v - minHR) / hrRange) * cH
    }));

    // Fill area under line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, cBot);
    for (let i = 1; i < pts.length; i++) {
      const mx = (pts[i - 1].x + pts[i].x) / 2;
      ctx.bezierCurveTo(mx, pts[i - 1].y, mx, pts[i].y, pts[i].x, pts[i].y);
    }
    ctx.lineTo(pts[pts.length - 1].x, cBot);
    ctx.closePath();
    ctx.fillStyle = 'rgba(248,113,113,0.18)'; ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const mx = (pts[i - 1].x + pts[i].x) / 2;
      ctx.bezierCurveTo(mx, pts[i - 1].y, mx, pts[i].y, pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = '#f87171'; ctx.lineWidth = 2;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();

    // Min / max labels
    ctx.fillStyle = 'rgba(107,114,128,0.9)';
    ctx.font = `500 9px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxHR) + ' bpm', PADDING + COL - 4, cTop + 9);
    ctx.fillText(Math.round(minHR) + ' bpm', PADDING + COL - 4, cBot);
    ctx.textAlign = 'left';

    y += HR_CHART_H + GAP;
  }

  // Footer
  y += 20;
  ctx.fillStyle = '#374151';
  ctx.fillRect(PADDING, y, COL, 1);
  y += 14;
  ctx.fillStyle = '#4b5563';
  ctx.font = `400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('liftlog · track your gains', W / 2, y);
  ctx.textAlign = 'left';

  // Share
  canvas.toBlob(async blob => {
    const file = new File([blob], `liftlog-${session.date || 'workout'}.png`, { type: 'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
      } catch(e) { if (e.name !== 'AbortError') fallbackDownload(canvas, session.date); }
    } else {
      fallbackDownload(canvas, session.date);
    }
  }, 'image/png');
}

function fallbackDownload(canvas, date) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `liftlog-${date || 'workout'}.png`;
  a.click();
}


// ── Toast ──────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Scroll-tap guard (main UI only) ──────────────────────────────────────────
// Suppresses add-set-btn taps when the finger moves >6px (scroll gesture).
// Workout overlay buttons are handled by attachWkTouchDelegate instead.
;(function() {
  const SCROLL_THRESHOLD = 6;
  let _ty = null, _scrolled = false;
  document.addEventListener('touchstart', e => {
    _ty = e.touches[0].clientY;
    _scrolled = false;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (_ty !== null && Math.abs(e.touches[0].clientY - _ty) > SCROLL_THRESHOLD) _scrolled = true;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (_scrolled && !e.target.closest('#wk-scroll')) {
      const btn = e.target.closest('.add-set-btn');
      if (btn) { e.preventDefault(); e.stopImmediatePropagation(); }
    }
    _ty = null;
  }, { capture: true });
})();

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-US',{ weekday:'long', month:'long', day:'numeric' });

// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js?v=5').then(reg => {
    // When a new SW is waiting, skip waiting and reload to apply update immediately
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          newWorker.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(() => {});
  // Reload when the new SW takes control
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('liftlog_theme', next);
  applyTheme(next);
}

// Load saved theme before render to avoid flash
applyTheme(localStorage.getItem('liftlog_theme') || 'dark');

loadState();
render();

// Banner tap to maximize — wire ontouchend for iOS reliability
document.getElementById('wk-banner').ontouchend = function(e) { e.preventDefault(); maximizeWorkout(); };

// Restore in-progress workout if app was closed mid-session
try {
  const wkRaw = localStorage.getItem(WK_KEY);
  if (wkRaw) {
    const saved = JSON.parse(wkRaw);
    if (saved.day && S.split[saved.day]) {
      WK.day          = saved.day;
      WK.done         = saved.done || {};
      WK.pausedElapsed = saved.pausedElapsed || 0;
      WK.paused       = !!saved.paused;
      // Use saved absolute startTime so timer includes time app was closed
      WK.startTime    = saved.startTime || Date.now();
      resumeWorkoutUI(saved.day);
      if (WK.paused) {
        document.getElementById('wk-pause-icon') && (document.getElementById('wk-pause-icon').innerHTML = svg(ICO.play, 13));
        document.getElementById('wk-pause-label') && (document.getElementById('wk-pause-label').textContent = 'Resume');
        document.getElementById('wk-paused-label') && (document.getElementById('wk-paused-label').style.display = 'block');
      }
    }
  }
} catch(e) {}
</script>
