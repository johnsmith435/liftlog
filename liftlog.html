<!-- LiftLog v6 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LiftLog">
  <meta name="theme-color" content="#818cf8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>LiftLog</title>
  <script>if(navigator.standalone)document.documentElement.classList.add('pwa');</script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; }
    :root {
      --bg: #0a0a0a; --card: #141414; --elevated: #1c1c1c;
      --border: #262626; --border-hover: #363636;
      --primary: #818cf8; --primary-dim: rgba(129,140,248,0.12);
      --push: #fb923c; --push-dim: rgba(251,146,60,0.12);
      --pull: #60a5fa; --pull-dim: rgba(96,165,250,0.12);
      --legs: #4ade80; --legs-dim: rgba(74,222,128,0.12);
      --arms: #c084fc; --arms-dim: rgba(192,132,252,0.12);
      --dash: #f472b6; --text: #f1f5f9;
      --muted: #4b5563; --muted-light: #9ca3af;
      --danger: #f87171; --success: #4ade80; --orange: #fb923c;
      --r: 10px; --r-sm: 6px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
    /* PWA standalone: push header content below notch/Dynamic Island */
    html.pwa .header { padding-top: max(20px, env(safe-area-inset-top)); }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--primary); }
    .header-date { font-size: 12px; color: var(--muted-light); }

    /* Nav */
    .nav { display: flex; padding: 12px 20px; gap: 6px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn { display: flex; align-items: center; gap: 7px; padding: 7px 15px; border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent; color: var(--muted-light); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .nav-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .nav-btn[data-day="push"].active      { background: var(--push-dim); border-color: var(--push); color: var(--push); }
    .nav-btn[data-day="pull"].active      { background: var(--pull-dim); border-color: var(--pull); color: var(--pull); }
    .nav-btn[data-day="legs"].active      { background: var(--legs-dim); border-color: var(--legs); color: var(--legs); }
    .nav-btn[data-day="arms"].active      { background: var(--arms-dim); border-color: var(--arms); color: var(--arms); }
    .nav-btn[data-day="dashboard"].active { background: rgba(244,114,182,0.12); border-color: var(--dash); color: var(--dash); }

    /* Main */
    .main { max-width: 860px; margin: 0 auto; padding: 24px; }
    .day-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
    .day-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
    .day-subtitle { font-size: 12px; color: var(--muted-light); margin-top: 5px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--r-sm); border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: var(--elevated); color: var(--muted-light); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }
    .btn-danger-sm { background: transparent; color: var(--danger); border: 1px solid rgba(248,113,113,0.25); border-radius: var(--r-sm); padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn-danger-sm:hover { background: rgba(248,113,113,0.1); }
    .icon-btn { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .icon-btn:hover { color: var(--text); border-color: var(--border-hover); background: var(--elevated); }
    .icon-btn.swap:hover   { color: var(--primary); border-color: var(--primary); background: var(--primary-dim); }
    .icon-btn.danger:hover { color: var(--danger); border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
    .icon-btn.is-active    { color: var(--primary); border-color: var(--primary); background: var(--primary-dim); }

    /* Section divider */
    .section-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 16px; }
    .section-divider-line { flex: 1; height: 1px; background: var(--border); }
    .section-divider-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); white-space: nowrap; }
    .history-count-badge { background: var(--elevated); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--muted-light); }

    /* Exercise list & cards */
    .exercises-list { display: flex; flex-direction: column; gap: 10px; }
    .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: border-color 0.15s; }
    .exercise-card:hover { border-color: var(--border-hover); }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .drag-handle { color: var(--muted); cursor: grab; padding: 2px; display: flex; align-items: center; flex-shrink: 0; }
    .drag-handle:active { cursor: grabbing; }
    .card-name { flex: 1; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .cali-link { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; background: rgba(129,140,248,0.1); color: var(--primary); text-decoration: none; flex-shrink: 0; transition: background 0.15s; }
    .cali-link:hover { background: rgba(129,140,248,0.25); }
    .card-actions { display: flex; gap: 6px; }

    /* Description panel */
    .card-desc { padding: 11px 14px; background: rgba(129,140,248,0.04); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted-light); line-height: 1.6; display: none; }
    .card-desc.open { display: block; }
    .desc-src { display: inline-block; margin-top: 6px; font-size: 10px; color: var(--primary); opacity: 0.7; text-decoration: none; }
    .desc-src:hover { opacity: 1; }

    /* Previous session strip */
    .card-prev { padding: 7px 14px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .prev-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); flex-shrink: 0; }
    .prev-chip { background: var(--elevated); border: 1px solid var(--border); border-radius: 4px; padding: 1px 8px; font-size: 11px; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; color: var(--muted-light); }

    /* ── Set rows ── */
    .card-body { padding: 14px; }
    .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .set-row-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; width: 32px; flex-shrink: 0; }
    .set-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 70px; }
    .set-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
    .set-input {
      background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 9px 10px; color: var(--text); font-size: 16px;
      font-family: 'SF Mono','Fira Code',ui-monospace,monospace;
      width: 100%; text-align: center; transition: border-color 0.15s;
    }
    .set-input:focus { outline: none; border-color: var(--primary); }
    .set-input::placeholder { color: var(--muted); font-size: 13px; }
    .set-input::-webkit-inner-spin-button, .set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .sets-counter { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .sets-counter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
    .sets-counter-control { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; background: var(--elevated); }
    .sets-counter-btn { width: 34px; height: 38px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--muted-light); cursor: pointer; font-size: 18px; transition: all 0.15s; }
    .sets-counter-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .sets-counter-val { min-width: 32px; text-align: center; font-size: 16px; font-weight: 600; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; color: var(--text); padding: 0 4px; line-height: 38px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

    .remove-set-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; line-height: 1; }
    .remove-set-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }
    .add-set-btn { width: 100%; margin-top: 4px; padding: 6px; background: transparent; border: 1px dashed var(--border); border-radius: var(--r-sm); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .add-set-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .workout-actions { display: flex; gap: 8px; margin-top: 20px; }

    /* Session history */
    .session-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 6px; transition: border-color 0.15s; }
    .session-item:hover { border-color: var(--border-hover); }
    .session-item-header { display: flex; align-items: center; gap: 12px; padding: 11px 14px; cursor: pointer; user-select: none; }
    .session-item-header:hover { background: rgba(255,255,255,0.02); }
    .session-date-label { font-size: 13px; font-weight: 600; flex: 1; }
    .session-meta-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .session-meta-pill { font-size: 11px; color: var(--muted-light); background: var(--elevated); border: 1px solid var(--border); border-radius: 4px; padding: 1px 8px; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
    .session-chevron { color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
    .session-item.open .session-chevron { transform: rotate(180deg); }
    .session-body { display: none; border-top: 1px solid var(--border); }
    .session-item.open .session-body { display: block; }
    .session-ex-row { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .session-ex-row:last-child { border-bottom: none; }
    .session-ex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .session-ex-name { font-size: 12px; font-weight: 600; }
    .session-ex-stats { font-size: 11px; color: var(--muted-light); font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
    .pr-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; background: rgba(251,146,60,0.15); color: var(--orange); font-size: 10px; font-weight: 700; margin-left: 4px; }
    .session-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-top: 1px solid var(--border); background: rgba(255,255,255,0.01); }
    .session-date-edit { display: flex; align-items: center; gap: 6px; }
    .date-input-inline { background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 8px; color: var(--text); font-size: 12px; cursor: pointer; }
    .date-input-inline:focus { outline: none; border-color: var(--primary); }
    .btn-save-date { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary); border-radius: var(--r-sm); padding: 3px 9px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-save-date:hover { background: var(--primary); color: #fff; }
    .history-show-more { display: block; text-align: center; padding: 10px; font-size: 12px; color: var(--primary); cursor: pointer; background: transparent; border: 1px dashed var(--border); border-radius: var(--r-sm); width: 100%; transition: all 0.15s; }
    .history-show-more:hover { background: var(--primary-dim); border-color: var(--primary); }

    /* Empty state */
    .empty-state { text-align: center; padding: 56px 24px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 14px; color: var(--muted-light); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: flex-start; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 0; width: 100%; max-width: 620px; height: 100%; max-height: 100%; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.16,1,0.3,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; padding-top: max(15px, env(safe-area-inset-top)); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    html.pwa .modal-header { padding-top: max(20px, env(safe-area-inset-top)); }
    .modal-title { font-size: 15px; font-weight: 600; }
    .close-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: var(--r-sm); border: none; background: var(--elevated); color: var(--muted-light); cursor: pointer; font-size: 18px; line-height: 1; }
    .close-btn:hover { color: var(--text); }
    .bank-search-row { padding: 10px 18px 0; flex-shrink: 0; }
    .bank-search { width: 100%; background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 8px 12px; color: var(--text); font-size: 16px; outline: none; transition: border-color 0.15s; }
    .bank-search:focus { border-color: var(--primary); }
    .bank-search::placeholder { color: var(--muted); }
    .bank-filter-row { display: flex; gap: 6px; padding: 10px 18px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
    .bank-filter-row::-webkit-scrollbar { display: none; }
    .filter-pill { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted-light); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .filter-pill.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
    .bank-grid { padding: 14px 18px; display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 6px; overflow-y: auto; flex: 1; }
    .bank-item { padding: 9px 12px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--elevated); cursor: pointer; transition: all 0.15s; font-size: 12px; font-weight: 500; position: relative; }
    @media (hover: hover) { .bank-item:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); } }
    .bank-item.selected { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .bank-item.in-day { border-color: var(--border-hover); color: var(--muted-light); }
    .bank-item-name { padding-right: 20px; }
    .bank-mg { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
    .bank-ext-link { position: absolute; top: 8px; right: 8px; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 3px; background: rgba(129,140,248,0.15); color: var(--primary); text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }
    .bank-ext-link:hover { opacity: 1; background: rgba(129,140,248,0.3); }
    .bank-empty { grid-column: 1/-1; text-align: center; padding: 32px; color: var(--muted-light); font-size: 13px; }
    .bank-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 10px; color: var(--text); font-size: 14px; margin-bottom: 6px; }
    .bank-input:focus { outline: none; border-color: var(--primary); }
    .bank-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 10px; color: var(--muted-light); font-size: 13px; cursor: pointer; margin-bottom: 8px; }
    .bank-select:focus { outline: none; border-color: var(--primary); }
    .bank-footer { padding: 10px 18px; padding-bottom: max(10px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
    .swap-picker { padding: 10px 18px; padding-bottom: max(10px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--card); flex-shrink: 0; display: none; }
    .swap-picker-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
    .swap-picker-list { display: flex; flex-direction: column; gap: 6px; }
    .swap-pick-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .swap-pick-item:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .bank-add-card { grid-column: 1/-1; background: var(--elevated); border: 1px dashed var(--border); border-radius: var(--r-sm); padding: 12px; }
    .bank-add-card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .bank-item-delete { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 3px; background: transparent; border: none; color: var(--muted); cursor: pointer; opacity: 0; transition: all 0.15s; }
    .bank-item:hover .bank-item-delete { opacity: 1; }
    .bank-item-delete:hover { color: var(--danger); background: rgba(248,113,113,0.15); }
    .bank-item-info { position: absolute; top: 6px; right: 28px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 3px; background: transparent; border: none; color: var(--muted); cursor: pointer; opacity: 0; transition: all 0.15s; }
    .bank-item:hover .bank-item-info { opacity: 1; }
    .bank-item-info:hover { color: var(--primary); background: var(--primary-dim); }
    .bank-item-info.solo { right: 6px; }
    .bank-item-desc { display: none; margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted-light); line-height: 1.55; grid-column: 1/-1; }
    .bank-item-desc.open { display: block; }

    /* Dashboard */
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-sub { font-size: 11px; color: var(--muted-light); margin-top: 3px; }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 16px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .chart-title { font-size: 14px; font-weight: 600; }
    .chart-select { background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 10px; color: var(--text); font-size: 12px; cursor: pointer; }

    /* PR table */
    .pr-table-wrap { overflow-x: auto; }
    table.pr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .pr-table th { text-align: left; padding: 7px 10px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); }
    .pr-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--muted-light); vertical-align: middle; }
    .pr-table tr:last-child td { border-bottom: none; }
    .pr-table tr:hover td { background: rgba(255,255,255,0.02); }
    .pr-table td:first-child { color: var(--text); font-weight: 500; }
    .pr-table td.mono { font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
    .pr-gain-pos { color: var(--success); }
    .pr-gain-neu { color: var(--muted-light); }

    /* History table */
    .hist-table-wrap { margin-top: 14px; overflow-x: auto; }
    table.hist-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .hist-table th { text-align: left; padding: 7px 10px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .hist-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--muted-light); }
    .hist-table tr:last-child td { border-bottom: none; }
    .hist-table tr:hover td { background: rgba(255,255,255,0.02); }
    .hist-table td:first-child { color: var(--text); font-weight: 500; white-space: nowrap; }
    .hist-table td.mono { font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 15px; font-size: 13px; z-index: 300; transform: translateY(12px); opacity: 0; transition: all 0.25s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(74,222,128,0.4); color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.4); color: var(--danger); }
    .sortable-ghost { opacity: 0.25; }

    /* ── Active Workout Overlay ── */
    .workout-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; overflow: hidden; }
    .workout-overlay-header { display: flex; align-items: center; justify-content: space-between; padding: max(18px, env(safe-area-inset-top)) 20px 14px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; gap: 10px; }
    html.pwa .workout-overlay-header { padding-top: max(20px, env(safe-area-inset-top)); }
    .workout-timer { font-size: 22px; font-weight: 700; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; color: var(--primary); letter-spacing: 1px; }
    .workout-title { font-size: 15px; font-weight: 600; flex: 1; text-align: center; }
    .workout-scroll { flex: 1; overflow-y: auto; padding: 16px 16px 120px; }
    .workout-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 8px; }

    /* Workout exercise card */
    .wk-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; transition: all 0.2s; }
    .wk-card.done { opacity: 0.5; }
    .wk-card.done .wk-card-header { background: rgba(74,222,128,0.06); }
    .wk-card-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .wk-done-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; flex-shrink: 0; transition: all 0.15s; }
    .wk-done-btn.checked { border-color: var(--success); background: var(--success); color: #fff; }
    .wk-card-name { flex: 1; font-size: 14px; font-weight: 600; }
    .wk-card-body { padding: 12px 14px; }
    .wk-prev { padding: 6px 14px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted-light); }
    .wk-suggest { padding: 6px 14px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--orange); background: rgba(251,146,60,0.06); display: flex; align-items: center; gap: 5px; }
    .wk-card.done .set-input { opacity: 0.4; pointer-events: none; }
    .wk-card.done .sets-counter-btn { opacity: 0.4; pointer-events: none; }

    /* Timer card */
    .wk-timer-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .wk-timer-main { font-size: 48px; font-weight: 700; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; color: var(--primary); letter-spacing: 2px; line-height: 1; }
    .wk-timer-paused { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--danger); margin-top: 4px; }
    .wk-insights { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .wk-insight-chip { background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 10px; font-size: 11px; color: var(--muted-light); text-align: right; font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }

    /* ── Workout Summary Modal ── */
    .summary-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 400; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .summary-overlay.open { opacity: 1; pointer-events: auto; }
    .summary-modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--r) var(--r) 0 0; width: 100%; max-width: 620px; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.16,1,0.3,1); }
    .summary-overlay.open .summary-modal { transform: translateY(0); }
    .summary-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .summary-body { overflow-y: auto; padding: 16px 18px; padding-bottom: max(16px, env(safe-area-inset-bottom)); flex: 1; }
    .summary-section { margin-bottom: 20px; }
    .summary-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 10px; }
    .summary-ex-row { padding: 10px 12px; background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; }
    .summary-ex-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .summary-ex-stats { font-size: 12px; color: var(--muted-light); font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
    .summary-ex-insight { font-size: 11px; color: var(--orange); margin-top: 4px; }
    .pr-badge { background: rgba(251,146,60,0.15); color: var(--orange); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
    .up-badge { background: rgba(74,222,128,0.12); color: var(--success); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
    .summary-stat-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .summary-stat { flex: 1; min-width: 80px; background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; text-align: center; }
    .summary-stat-val { font-size: 22px; font-weight: 700; color: var(--primary); }
    .summary-stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-top: 2px; }
    .health-card { background: linear-gradient(135deg, rgba(248,113,113,0.08), rgba(251,146,60,0.08)); border: 1px solid rgba(248,113,113,0.25); border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px; }
    .health-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .health-card-title { font-size: 12px; font-weight: 600; color: var(--danger); text-transform: uppercase; letter-spacing: 0.6px; display: flex; align-items: center; gap: 6px; }
    .health-stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .health-stat { background: rgba(0,0,0,0.15); border-radius: var(--r-sm); padding: 10px 12px; }
    html[data-theme="light"] .health-stat { background: rgba(255,255,255,0.6); }
    .health-stat-val { font-size: 24px; font-weight: 700; color: var(--danger); font-family: 'SF Mono','Fira Code',ui-monospace,monospace; }
    .health-stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted-light); margin-top: 2px; }
    .health-import-btn { display: flex; align-items: center; gap: 7px; padding: 10px 16px; border-radius: var(--r-sm); border: 1px dashed rgba(248,113,113,0.4); background: transparent; color: var(--danger); font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; transition: all 0.15s; }
    .health-import-btn:hover { background: rgba(248,113,113,0.08); border-color: var(--danger); }

    /* Light theme overrides */
    html[data-theme="light"] {
      --bg: #f5f5f5; --card: #ffffff; --elevated: #ececec;
      --border: #d4d4d4; --border-hover: #b0b0b0;
      --primary: #6366f1; --primary-dim: rgba(99,102,241,0.10);
      --push: #ea580c; --push-dim: rgba(234,88,12,0.10);
      --pull: #2563eb; --pull-dim: rgba(37,99,235,0.10);
      --legs: #16a34a; --legs-dim: rgba(22,163,74,0.10);
      --arms: #9333ea; --arms-dim: rgba(147,51,234,0.10);
      --dash: #db2777; --text: #111111;
      --muted: #9ca3af; --muted-light: #6b7280;
      --danger: #dc2626; --success: #16a34a; --orange: #ea580c;
    }
    html[data-theme="light"] .session-item-header:hover { background: rgba(0,0,0,0.03); }
    html[data-theme="light"] .modal-overlay { background: rgba(0,0,0,0.5); }
    html[data-theme="light"] .pr-table tr:hover td { background: rgba(0,0,0,0.03); }
    html[data-theme="light"] .hist-table tr:hover td { background: rgba(0,0,0,0.03); }

    /* Theme toggle button */
    .theme-toggle { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent; color: var(--muted-light); cursor: pointer; font-size: 15px; transition: all 0.15s; flex-shrink: 0; }
    .theme-toggle:hover { color: var(--text); border-color: var(--border-hover); background: var(--elevated); }

    @media (max-width: 600px) {
      .main { padding: 14px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .day-title { font-size: 20px; }
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div style="position:sticky;top:0;z-index:20;background:var(--bg)">
<div class="header">
  <div class="logo">Lift<span>Log</span> <span style="font-size:10px;color:var(--muted);font-weight:400">v7</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="header-date" id="header-date"></div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" data-day="push"      onclick="switchDay('push')"><span class="nav-dot"></span>Push</button>
  <button class="nav-btn"        data-day="pull"      onclick="switchDay('pull')"><span class="nav-dot"></span>Pull</button>
  <button class="nav-btn"        data-day="legs"      onclick="switchDay('legs')"><span class="nav-dot"></span>Legs</button>
  <button class="nav-btn"        data-day="arms"      onclick="switchDay('arms')"><span class="nav-dot"></span>Arms</button>
  <button class="nav-btn"        data-day="dashboard" onclick="switchDay('dashboard')"><span class="nav-dot"></span>Dashboard</button>
</div>
</div>
<div class="main" id="main"></div>

<!-- Exercise Bank Modal -->
<div class="modal-overlay" id="bank-modal" onclick="handleModalBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Exercise Bank</div>
      <button class="close-btn" onclick="closeBankModal()">×</button>
    </div>
    <div class="bank-search-row">
      <input class="bank-search" id="bank-search" type="text" placeholder="Search exercises…" oninput="renderBankGrid()">
    </div>
    <div class="bank-filter-row" id="bank-filters"></div>
    <div class="bank-grid" id="bank-grid"></div>
    <div class="bank-footer" id="bank-footer" style="display:none">
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1;justify-content:center" id="bank-add-btn" onclick="confirmBankSelection()"></button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="bank-swap-btn" onclick="showSwapPicker()"></button>
      </div>
    </div>
    <div class="swap-picker" id="swap-picker">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="swap-picker-title">Swap out which exercise?</div>
        <button class="close-btn" style="font-size:14px" onclick="hideSwapPicker()">✕</button>
      </div>
      <div class="swap-picker-list" id="swap-picker-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Active Workout Overlay -->
<div class="workout-overlay" id="workout-overlay" style="display:none">
  <div class="workout-overlay-header">
    <button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;gap:4px" id="wk-minimize-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      Hide
    </button>
    <div class="workout-title" id="wk-title"></div>
    <button class="btn btn-ghost" style="padding:6px 14px;font-size:12px" onclick="openReorder(WK.day)">Reorder</button>
  </div>
  <div class="workout-scroll" id="wk-scroll"></div>
  <div class="workout-footer">
    <button class="btn btn-ghost" style="flex:0 0 auto;color:var(--danger);border-color:var(--danger)" onclick="cancelWorkout()">✕</button>
    <button class="btn btn-ghost" style="flex:0 0 auto" onclick="openBankModal(null, WK.day)">+ Add</button>
    <button class="btn btn-primary" style="flex:1" onclick="finishWorkout()">Finish &amp; Log</button>
  </div>
</div>

<!-- Return-to-workout banner (shown when workout is minimized) -->
<div id="wk-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:199;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--primary);cursor:pointer;display:none" onclick="maximizeWorkout()">
  <div style="display:flex;align-items:center;justify-content:space-between;max-width:860px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:13px;font-weight:700;color:#fff" id="wk-banner-title"></div>
      <div style="font-size:13px;font-family:monospace;color:rgba(255,255,255,0.85)" id="wk-banner-timer"></div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.8);font-weight:600">Tap to return ↑</div>
  </div>
</div>

<!-- Workout Reorder Sheet -->
<div id="wk-reorder-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:flex-end;justify-content:center">
  <div style="background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:620px;padding:16px 16px max(20px,env(safe-area-inset-bottom))">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:15px;font-weight:700">Reorder Exercises</div>
      <button class="btn btn-ghost" style="padding:5px 14px;font-size:13px" onclick="closeReorder()">Done</button>
    </div>
    <div id="wk-reorder-list"></div>
  </div>
</div>

<!-- Workout Summary Modal -->
<div class="summary-overlay" id="summary-overlay">
  <div class="summary-modal">
    <div class="summary-header">
      <div class="modal-title">Workout Summary</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;gap:5px" onclick="shareWorkoutCard()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
        <button class="close-btn" onclick="closeSummary()">×</button>
      </div>
    </div>
    <div class="summary-body" id="summary-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// EXERCISE DATABASE
// ═══════════════════════════════════════════════════════
const C = s => `https://calistree.app/datasheet/${s}?cat=e`;

const DEFAULT_BANK = {
  // Chest
  bench_press:            { id:'bench_press',           name:'Bench Press',               muscleGroup:'chest',     caliUrl:C('bench-press'),           desc:'Lie on flat bench, grip barbell slightly wider than shoulders. Lower to mid-chest, press to full extension. The foundational chest movement.' },
  incline_db_press:       { id:'incline_db_press',      name:'Incline DB Press',           muscleGroup:'chest',     caliUrl:C('incline-dumbbell-press'), desc:'Set bench to 30–45°. Press dumbbells from shoulder height to lockout. Greater range of motion than barbell — targets the upper chest.' },
  decline_bench:          { id:'decline_bench',         name:'Decline Bench Press',        muscleGroup:'chest',     caliUrl:C('decline-bench-press'),    desc:'Bench angled ~15–30° downward. Shifts emphasis to the lower chest. Usually allows heavier loads than flat or incline.' },
  cable_fly:              { id:'cable_fly',             name:'Cable Chest Fly',            muscleGroup:'chest',     caliUrl:C('cable-fly'),              desc:'Cables at mid-height. Bring handles together in a wide arc with a slight elbow bend. Constant cable tension throughout the entire ROM.' },
  low_to_high_fly:        { id:'low_to_high_fly',       name:'Low-to-High Cable Fly',      muscleGroup:'chest',     caliUrl:C('low-cable-fly'),          desc:'Cables set at the lowest position. Sweep handles upward and inward toward chin height in a wide arc. Targets the upper chest (clavicular head) with constant tension.' },
  db_fly:                 { id:'db_fly',                name:'Dumbbell Fly',               muscleGroup:'chest',     caliUrl:C('dumbbell-fly'),           desc:'Lie on bench. Lower dumbbells in a wide arc with a slight elbow bend to stretch the chest, then squeeze back up. Isolates the pec.' },
  push_up:                { id:'push_up',               name:'Push-Up',                    muscleGroup:'chest',     caliUrl:C('push-up'),                desc:'Hands shoulder-width, lower chest to floor, push to lockout. The baseline bodyweight chest press — scalable to any level.' },
  close_grip_bench:       { id:'close_grip_bench',      name:'Close Grip Bench Press',     muscleGroup:'chest',     caliUrl:C('close-grip-bench-press'), desc:'Narrow grip (shoulder-width or less). Reduces chest involvement, shifts primary load to triceps. Strong compound movement for arms and chest.' },
  pec_deck:               { id:'pec_deck',              name:'Pec Deck Machine',           muscleGroup:'chest',     caliUrl:C('pec-deck'),               desc:'Sit upright in machine, bring arms together. Pure pectoral isolation with a fixed path and constant tension. Good finisher.' },
  // Back
  deadlift:               { id:'deadlift',              name:'Deadlift',                   muscleGroup:'back',      caliUrl:C('deadlift'),               desc:'Bar over mid-foot, hinge and drive hips to stand. Builds the entire posterior chain — lats, traps, erectors, hamstrings, glutes.' },
  barbell_row:            { id:'barbell_row',           name:'Barbell Row',                muscleGroup:'back',      caliUrl:C('barbell-row'),            desc:'Hinge at hips to ~45°, pull bar to lower ribcage keeping back flat. Major lat and upper-back thickness builder.' },
  lat_pulldown:           { id:'lat_pulldown',          name:'Lat Pulldown',               muscleGroup:'back',      caliUrl:C('lat-pulldown'),           desc:'Seated cable pull. Drive elbows down and back to pull bar to upper chest. Wide grip primarily targets the lats for back width.' },
  seated_row:             { id:'seated_row',            name:'Seated Cable Row',           muscleGroup:'back',      caliUrl:C('seated-cable-row'),       desc:'Pull handle to navel, retract shoulder blades fully. Develops mid-back thickness through full scapular range.' },
  tbar_row:               { id:'tbar_row',              name:'T-Bar Row',                  muscleGroup:'back',      caliUrl:C('t-bar-row'),              desc:'Load one end of a barbell, straddle it, pull toward chest. Close grip hits lower lats; wider grip hits mid-back and rhomboids.' },
  pull_up:                { id:'pull_up',               name:'Pull-Up / Chin-Up',          muscleGroup:'back',      caliUrl:C('pull-up'),                desc:'Dead hang, pull chin above bar. Overhand (pull-up) emphasizes lats. Underhand (chin-up) adds more bicep involvement.' },
  weighted_pull_up:       { id:'weighted_pull_up',      name:'Weighted Pull-Up',           muscleGroup:'back',      caliUrl:C('pull-up'),                desc:'Standard pull-up with added load via a weight belt. Pull chin above bar from a dead hang. Add weight progressively as bodyweight reps become easy.' },
  machine_single_arm_row: { id:'machine_single_arm_row',name:'Machine Single-Arm Row',     muscleGroup:'back',                                           desc:'Chest-supported machine row performed one arm at a time. Pull the handle to your hip with full elbow retraction. Eliminates lower-back fatigue and isolates each side independently.' },
  cable_lat_swing:        { id:'cable_lat_swing',       name:'Cable Lat Swing',            muscleGroup:'back',                                           desc:'Stand facing cable tower, single handle at mid-to-high pulley. Keeping arm straight, sweep it down and back in an arc. Isolates the lat through a long range with constant tension.' },
  single_arm_cable_pd:    { id:'single_arm_cable_pd',   name:'Single-Arm Cable Pulldown',  muscleGroup:'back',      caliUrl:C('single-arm-lat-pulldown'), desc:'High pulley with single handle. Pull down to your hip on one side, keeping torso stable. Unilateral lat isolation for addressing strength imbalances.' },
  db_row:                 { id:'db_row',                name:'Single-Arm DB Row',          muscleGroup:'back',      caliUrl:C('single-arm-dumbbell-row'), desc:'One hand on bench, pull dumbbell to hip, keeping elbow close. Full unilateral lat and mid-back work without lower-back load.' },
  straight_arm_pd:        { id:'straight_arm_pd',       name:'Straight-Arm Pulldown',      muscleGroup:'back',      caliUrl:C('straight-arm-pulldown'), desc:'High pulley, arms stay straight as you push bar to thighs. Isolates the lats with zero bicep involvement.' },
  back_extension:         { id:'back_extension',        name:'Back Extension',             muscleGroup:'back',      caliUrl:C('back-extension'),         desc:'Hyperextension bench. Lower torso, raise back to parallel. Strengthens erectors, glutes, and hamstrings. Hold a plate or dumbbell to add load.' },
  rack_pull:              { id:'rack_pull',             name:'Rack Pull',                  muscleGroup:'back',      caliUrl:C('rack-pull'),              desc:'Deadlift starting from knee height. Shorter range allows heavier loads — emphasizes upper back, traps, and lockout strength.' },
  // Shoulders

// ── Persistence ────────────────────────────────────────────────────────────
// ── Storage key is PERMANENT — never change this ──────────────────────────
const STORAGE_KEY = 'liftlog_data';

function loadState() {
  try {
    // Migrate from any previous key versions
    for (const oldKey of ['liftlog_v3','liftlog_v2']) {
      const old = localStorage.getItem(oldKey);
      if (old && !localStorage.getItem(STORAGE_KEY)) {
        localStorage.setItem(STORAGE_KEY, old);
        localStorage.removeItem(oldKey);
      }
    }
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    S = { ...S, ...saved };
    S.bank = { ...DEFAULT_BANK, ...(saved.bank||{}) };
    // Migrate session entries from old { weight, reps, sets } to array format
    ['push','pull','legs','arms'].forEach(day => {
      Object.keys(S.session[day]||{}).forEach(exId => {
        S.session[day][exId] = migrateEntry(S.session[day][exId]);
      });
    });
  } catch(e) { console.error(e); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); } catch(e) {}
  if (WK.day) saveWK();
}

const WK_KEY = 'liftlog_wk';
function saveWK() {
  if (!WK.day) { localStorage.removeItem(WK_KEY); return; }
  // Store absolute startTime so wall-clock time accumulates even when app is closed
  try { localStorage.setItem(WK_KEY, JSON.stringify({
    day: WK.day,
    startTime: WK.startTime,
    pausedElapsed: WK.paused
      ? WK.pausedElapsed + Math.floor((Date.now() - WK.startTime) / 1000)
      : WK.pausedElapsed,
    paused: WK.paused,
    done: WK.done
  })); } catch(e) {}
}
function clearWK() { localStorage.removeItem(WK_KEY); }

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `liftlog-backup-${date}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported','success');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const saved = JSON.parse(ev.target.result);
        if (!saved.history || !saved.split) { showToast('Invalid backup file','error'); return; }
        if (!confirm('This will replace all current data with the backup. Continue?')) return;
        S = { ...S, ...saved };
        S.bank = { ...DEFAULT_BANK, ...(saved.bank||{}) };
        save(); render();
        showToast('Data imported','success');
      } catch { showToast('Could not read file','error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getLastSession(day) {
  const s = S.history.filter(h => h.day === day);
  return s.length ? s[s.length-1] : null;
}
function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(str) {
  if (!str) return '';
  return new Date(str+'T12:00:00').toLocaleDateString('en-US',{ weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
function formatDateShort(str) {
  if (!str) return '';
  return new Date(str+'T12:00:00').toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
}
function sessionsThisMonth() {
  return S.history.filter(h => h.date.startsWith(today().slice(0,7))).length;
}
function getExerciseHistory(exId) {
  return S.history.filter(h => h.exercises[exId]?.length).sort((a,b) => a.date.localeCompare(b.date));
}
function getPR(exId) {
  let max = 0;
  S.history.forEach(h => (h.exercises[exId]||[]).forEach(s => { const w=parseFloat(s.weight)||0; if(w>max) max=w; }));
  return max;
}
// Returns true only if sessionId is the FIRST session where exId reached weight w
function isFirstPR(exId, sessionId, w) {
  if (!w || w <= 0) return false;
  const sorted = S.history.filter(h => h.exercises[exId]?.length).sort((a,b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  for (const h of sorted) {
    const maxW = Math.max(...(h.exercises[exId]||[]).map(s => parseFloat(s.weight)||0));
    if (maxW >= w) return h.id === sessionId;
  }
  return false;
}
function getDefaultEntry(exId, day) {
  const d = DEFAULT_ENTRY[day]?.[exId];
  const w = d?.weight ?? '', r = d?.reps ?? '', n = d?.sets ?? 3;
  return Array.from({ length: n }, () => ({ weight: w, reps: r }));
}
// Migrate old { weight, reps, sets } format to array format
function migrateEntry(entry) {
  if (Array.isArray(entry)) return entry;
  const n = parseInt(entry.sets) || 1;
  return Array.from({ length: n }, () => ({ weight: entry.weight||'', reps: entry.reps||'' }));
}
function getWeekLabel(date) {
  const d = new Date(date+'T12:00:00');
  const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
  return mon.toLocaleDateString('en-US',{ month:'short', day:'numeric' });
}
function getCurrentStreak() {
  if (!S.history.length) return 0;
  const dates = [...new Set(S.history.map(h => h.date))].sort((a,b) => b.localeCompare(a));
  let streak = 0, ref = today();
  for (const d of dates) {
    const diff = (new Date(ref+'T12:00:00') - new Date(d+'T12:00:00')) / 86400000;
    if (diff <= 1) { streak++; ref = d; }
    else break;
  }
  return streak;
}

// Epley formula: weight × (1 + reps/30)
function calc1RM(weight, reps) {
  const w = parseFloat(weight)||0, r = parseInt(reps)||0;
  if (!w || !r) return 0;
  if (r === 1) return w;
  return Math.round(w * (1 + r / 30));
}

function getBest1RM(exId) {
  let best = 0;
  S.history.forEach(h => {
    const s = h.exercises[exId]?.[0];
    if (!s) return;
    const v = calc1RM(s.weight, s.reps);
    if (v > best) best = v;
  });
  return best;
}

function daysSince(day) {
  const sessions = S.history.filter(h => h.day === day);
  if (!sessions.length) return null;
  const last = sessions.map(h => h.date).sort().pop();
  return Math.floor((new Date(today()+'T12:00:00') - new Date(last+'T12:00:00')) / 86400000);
}
